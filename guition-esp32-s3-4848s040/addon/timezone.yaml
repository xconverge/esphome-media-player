# =============================================================================
# CLOCK TIMEZONE
# =============================================================================
# Lets the user pick their timezone from a city list on the HA device page.
# The POSIX TZ string is applied at runtime via setenv/tzset so the clock
# screensaver (and any other .now() call) returns correct local time —
# regardless of what timezone the firmware was compiled under.
#
# The compile-time timezone is pinned to UTC in time.yaml; this select
# overrides it at boot (via restore_value → on_value) and whenever the
# user changes the selection.
# =============================================================================


globals:
  - id: tz_posix
    type: std::string
    initial_value: '"UTC0"'


esphome:
  on_boot:
    priority: -10
    then:
      - script.execute: apply_timezone


select:
  - platform: template
    name: "Clock: Timezone"
    id: clock_timezone
    icon: "mdi:map-clock"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "UTC"
    options:
      - "UTC"
      - "(-11:00) Pago Pago"
      - "(-10:00) Honolulu"
      - "(-09:00) Anchorage"
      - "(-08:00) Los Angeles"
      - "(-07:00) Denver"
      - "(-07:00) Phoenix"
      - "(-06:00) Chicago"
      - "(-06:00) Mexico City"
      - "(-05:00) Bogota"
      - "(-05:00) Havana"
      - "(-05:00) Lima"
      - "(-05:00) New York"
      - "(-04:00) Caracas"
      - "(-04:00) Halifax"
      - "(-04:00) Santiago"
      - "(-03:30) St. John's"
      - "(-03:00) Buenos Aires"
      - "(-03:00) Sao Paulo"
      - "(-01:00) Azores"
      - "(+00:00) Lisbon"
      - "(+00:00) London"
      - "(+00:00) Reykjavik"
      - "(+01:00) Amsterdam"
      - "(+01:00) Berlin"
      - "(+01:00) Lagos"
      - "(+01:00) Madrid"
      - "(+01:00) Paris"
      - "(+01:00) Rome"
      - "(+02:00) Athens"
      - "(+02:00) Bucharest"
      - "(+02:00) Cairo"
      - "(+02:00) Helsinki"
      - "(+02:00) Johannesburg"
      - "(+03:00) Istanbul"
      - "(+03:00) Moscow"
      - "(+03:00) Nairobi"
      - "(+03:00) Riyadh"
      - "(+03:30) Tehran"
      - "(+04:00) Dubai"
      - "(+04:30) Kabul"
      - "(+05:00) Almaty"
      - "(+05:00) Karachi"
      - "(+05:30) Mumbai"
      - "(+05:45) Kathmandu"
      - "(+06:00) Dhaka"
      - "(+06:30) Yangon"
      - "(+07:00) Bangkok"
      - "(+07:00) Jakarta"
      - "(+08:00) Beijing"
      - "(+08:00) Hong Kong"
      - "(+08:00) Perth"
      - "(+08:00) Singapore"
      - "(+08:00) Taipei"
      - "(+09:00) Seoul"
      - "(+09:00) Tokyo"
      - "(+09:30) Adelaide"
      - "(+09:30) Darwin"
      - "(+10:00) Brisbane"
      - "(+10:00) Sydney"
      - "(+12:00) Auckland"
    on_value:
      - script.execute: apply_timezone


script:
  - id: apply_timezone
    mode: single
    then:
      - lambda: |-
          static const char* const tz_table[][2] = {
            {"UTC",                  "UTC0"},
            {"(-11:00) Pago Pago",   "SST11"},
            {"(-10:00) Honolulu",    "HST10"},
            {"(-09:00) Anchorage",   "AKST9AKDT,M3.2.0,M11.1.0"},
            {"(-08:00) Los Angeles", "PST8PDT,M3.2.0,M11.1.0"},
            {"(-07:00) Denver",      "MST7MDT,M3.2.0,M11.1.0"},
            {"(-07:00) Phoenix",     "MST7"},
            {"(-06:00) Chicago",     "CST6CDT,M3.2.0,M11.1.0"},
            {"(-06:00) Mexico City", "CST6"},
            {"(-05:00) Bogota",      "<-05>5"},
            {"(-05:00) Havana",      "CST5CDT,M3.2.0/0,M11.1.0/1"},
            {"(-05:00) Lima",        "<-05>5"},
            {"(-05:00) New York",    "EST5EDT,M3.2.0,M11.1.0"},
            {"(-04:00) Caracas",     "<-04>4"},
            {"(-04:00) Halifax",     "AST4ADT,M3.2.0,M11.1.0"},
            {"(-04:00) Santiago",    "<-04>4<-03>,M9.1.6/24,M4.1.6/24"},
            {"(-03:30) St. John's", "NST3:30NDT,M3.2.0,M11.1.0"},
            {"(-03:00) Buenos Aires","<-03>3"},
            {"(-03:00) Sao Paulo",   "<-03>3"},
            {"(-01:00) Azores",      "<-01>1<+00>,M3.5.0/0,M10.5.0/1"},
            {"(+00:00) Lisbon",      "WET0WEST,M3.5.0/1,M10.5.0"},
            {"(+00:00) London",      "GMT0BST,M3.5.0/1,M10.5.0"},
            {"(+00:00) Reykjavik",   "GMT0"},
            {"(+01:00) Amsterdam",   "CET-1CEST,M3.5.0,M10.5.0/3"},
            {"(+01:00) Berlin",      "CET-1CEST,M3.5.0,M10.5.0/3"},
            {"(+01:00) Lagos",       "WAT-1"},
            {"(+01:00) Madrid",      "CET-1CEST,M3.5.0,M10.5.0/3"},
            {"(+01:00) Paris",       "CET-1CEST,M3.5.0,M10.5.0/3"},
            {"(+01:00) Rome",        "CET-1CEST,M3.5.0,M10.5.0/3"},
            {"(+02:00) Athens",      "EET-2EEST,M3.5.0/3,M10.5.0/4"},
            {"(+02:00) Bucharest",   "EET-2EEST,M3.5.0/3,M10.5.0/4"},
            {"(+02:00) Cairo",       "EET-2EEST,M4.5.5/0,M10.5.4/24"},
            {"(+02:00) Helsinki",    "EET-2EEST,M3.5.0/3,M10.5.0/4"},
            {"(+02:00) Johannesburg","SAST-2"},
            {"(+03:00) Istanbul",    "<+03>-3"},
            {"(+03:00) Moscow",      "MSK-3"},
            {"(+03:00) Nairobi",     "EAT-3"},
            {"(+03:00) Riyadh",      "<+03>-3"},
            {"(+03:30) Tehran",      "<+0330>-3:30"},
            {"(+04:00) Dubai",       "<+04>-4"},
            {"(+04:30) Kabul",       "<+0430>-4:30"},
            {"(+05:00) Almaty",      "<+05>-5"},
            {"(+05:00) Karachi",     "PKT-5"},
            {"(+05:30) Mumbai",      "IST-5:30"},
            {"(+05:45) Kathmandu",   "<+0545>-5:45"},
            {"(+06:00) Dhaka",       "<+06>-6"},
            {"(+06:30) Yangon",      "<+0630>-6:30"},
            {"(+07:00) Bangkok",     "<+07>-7"},
            {"(+07:00) Jakarta",     "WIB-7"},
            {"(+08:00) Beijing",     "CST-8"},
            {"(+08:00) Hong Kong",   "HKT-8"},
            {"(+08:00) Perth",       "AWST-8"},
            {"(+08:00) Singapore",   "<+08>-8"},
            {"(+08:00) Taipei",      "CST-8"},
            {"(+09:00) Seoul",       "KST-9"},
            {"(+09:00) Tokyo",       "JST-9"},
            {"(+09:30) Adelaide",    "ACST-9:30ACDT,M10.1.0,M4.1.0/3"},
            {"(+09:30) Darwin",      "ACST-9:30"},
            {"(+10:00) Brisbane",    "AEST-10"},
            {"(+10:00) Sydney",      "AEST-10AEDT,M10.1.0,M4.1.0/3"},
            {"(+12:00) Auckland",    "NZST-12NZDT,M9.5.0,M4.1.0/3"},
          };
          std::string sel = id(clock_timezone).current_option();
          if (sel.empty()) return;
          for (auto& e : tz_table) {
            if (sel == e[0]) {
              id(tz_posix) = e[1];
              id(ha_time).set_timezone(e[1]);
              setenv("TZ", e[1], 1);
              tzset();
              ESP_LOGI("timezone", "Applied timezone: %s -> %s", e[0], e[1]);
              return;
            }
          }
          ESP_LOGW("timezone", "Unknown timezone selection: %s", sel.c_str());
