ota:
  - platform: http_request
    on_begin:
      - lvgl.pause
      - light.turn_off:
          id: backlight
          transition_length: 0s
    on_error:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 0s
      - lvgl.resume

globals:
  - id: update_check_counter
    type: int
    initial_value: '0'

update:
  - platform: http_request
    id: firmware_update
    name: Firmware Update
    source: https://jtenniswood.github.io/esphome-media-player/firmware/media-player-4848s040.manifest.json
    update_interval: never
    on_update_available:
      then:
        - if:
            condition:
              lambda: 'return id(auto_update_switch).state;'
            then:
              - update.perform: firmware_update

switch:
  - platform: template
    name: "Auto Update"
    id: auto_update_switch
    icon: "mdi:update"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

select:
  - platform: template
    name: "Update Frequency"
    id: update_frequency_select
    icon: "mdi:timer-outline"
    options:
      - "Hourly"
      - "Daily"
      - "Weekly"
    initial_option: "Daily"
    optimistic: true
    restore_value: true

interval:
  - interval: 1h
    then:
      - lambda: |-
          if (!id(auto_update_switch).state) return;
          int counter = id(update_check_counter);
          std::string freq = id(update_frequency_select).current_option();
          int threshold = 24;
          if (freq == "Hourly") threshold = 1;
          else if (freq == "Weekly") threshold = 168;
          if (counter % threshold == 0) {
            id(firmware_update).update();
          }
          id(update_check_counter) = counter + 1;

button:
  - platform: template
    name: Install Latest Firmware
    icon: "mdi:update"
    on_press:
      - component.update: firmware_update
