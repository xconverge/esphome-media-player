substitutions:
  name: "music-dashboard-dev"
  friendly_name: "Music Dashboard Dev"
  # 270° mounting — see docs/advanced/display-rotation.md (swap_xy + mirrors)
  display_rotation: "270"
  touch_swap_xy: "true"
  touch_mirror_x: "true"
  touch_mirror_y: "false"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  music_dashboard: !include packages.yaml

external_components:
  - source:
      type: local
      path: ../components
    components: [online_image]
