substitutions:
  media_player: ""
  tv_media_player: ""
  ha_port: "8123"
  ha_host: "homeassistant.local"
  # Radio station favorites (from HA Browse Media > Favorites > Radio)
  # To find the content ID: open HA Developer Tools > Services > media_player.play_media,
  # use the UI media picker, then switch to YAML mode to see media_content_id.
  radio_station_1_name: "Station 1"
  radio_station_1_content_id: "FV:2/8"
  radio_station_2_name: "Station 2"
  radio_station_2_content_id: ""
  # Display rotation in degrees: 0, 90, 180, or 270
  # Rotate to match your preferred mounting orientation / power cable direction
  display_rotation: "0"
  # Touch transform (must match display_rotation):
  #   0:   mirror_x "false", mirror_y "false"
  #   90:  mirror_x "true",  mirror_y "false"
  #   180: mirror_x "true",  mirror_y "true"
  #   270: mirror_x "false", mirror_y "true"
  touch_mirror_x: "false"
  touch_mirror_y: "false"

packages:
  music: !include addon/music.yaml
  accent_color: !include addon/accent_color.yaml
  backlight: !include addon/backlight.yaml
  time_sync: !include addon/time.yaml
  network: !include addon/network.yaml
  speaker_group: !include addon/speaker_group.yaml
  fonts: !include assets/fonts.yaml
  icons: !include assets/icons.yaml
  device: !include device/device.yaml
  media_player_select: !include device/media_player_select.yaml
  sensors: !include device/sensors.yaml
  tv_sensors: !include device/tv_sensors.yaml
  lvgl: !include device/lvgl.yaml
  button: !include theme/button.yaml
