        # ---------------------------------------------------------------
        # HOME ASSISTANT SETUP PROMPT (WiFi connected, HA not yet)
        # ---------------------------------------------------------------
        # Shown after WiFi connects but before HA API connects.
        # Hidden by api on_client_connected; shown by on_client_disconnected.
        # ---------------------------------------------------------------
        - obj:
            id: ha_setup_prompt
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -80
                  text: $icon_ha
                  text_color: 0xFFFFFF
              - label:
                  text: "Home Assistant"
                  text_font: roboto30_font
                  text_color: 0xFFFFFF
                  align: center
                  y: -20
                  width: 400
                  height: 36
                  text_align: center
              - label:
                  id: ha_setup_instructions
                  text: "Add this device in\nSettings > Devices > ESPHome"
                  text_font: roboto19_font
                  text_color: 0x888888
                  align: center
                  y: 40
                  width: 400
                  height: 80
                  text_align: center

        # ---------------------------------------------------------------
        # WIFI SETUP PROMPT (shown when WiFi is not connected)
        # ---------------------------------------------------------------
        # Full-screen overlay shown on first boot (or whenever WiFi drops).
        # Hidden by wifi on_connect; shown by wifi on_disconnect.
        # Rendered last so it covers the HA prompt when both apply.
        # ---------------------------------------------------------------
        - obj:
            id: wifi_setup_prompt
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -80
                  text: $icon_wifi
                  text_color: 0xFFFFFF
              - label:
                  text: "WiFi Setup"
                  text_font: roboto30_font
                  text_color: 0xFFFFFF
                  align: center
                  y: -20
                  width: 300
                  height: 36
                  text_align: center
              - label:
                  id: wifi_setup_instructions
                  text: "Connect to the WiFi hotspot\nto configure your network"
                  text_font: roboto19_font
                  text_color: 0x888888
                  align: center
                  y: 40
                  width: 400
                  height: 80
                  text_align: center

        # ---------------------------------------------------------------
        # LOADING SCREEN (shown at boot until WiFi/grace period)
        # ---------------------------------------------------------------
        # Full-screen overlay, visible by default. Hidden when connected or
        # when grace period ends. Status and progress updated from network.yaml.
        # ---------------------------------------------------------------
        - obj:
            id: loading_screen
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: false
            widgets:
              - label:
                  text: "Starting up"
                  text_font: roboto_light40_font
                  text_color: 0xFFFFFF
                  align: center
                  y: -50
                  width: 400
                  height: 76
                  text_align: center
              - bar:
                  id: loading_progress_bar
                  align: center
                  y: 40
                  width: 80
                  height: 4
                  bg_color: 0x333333
                  bg_opa: 100%
                  radius: 3
                  min_value: 0
                  max_value: 100
                  value: 0
                  indicator:
                    bg_color: 0xFFFFFF
                    radius: 3
