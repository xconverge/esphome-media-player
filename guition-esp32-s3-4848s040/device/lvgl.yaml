# =============================================================================
# LVGL MUSIC DASHBOARD
# =============================================================================
# Single-screen now-playing view for any Home Assistant media player.
# Data from sensors.yaml; album art from online_image (addon/music.yaml).
# =============================================================================

lvgl:
  buffer_size: 25%
  on_boot:
    - lambda: |-
        lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_SCROLL_MOMENTUM);
        lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_SCROLL_ELASTIC);
        lv_obj_set_scroll_dir(id(speakers_container), LV_DIR_VER);
        lv_obj_set_style_pad_right(id(speakers_container), 0, LV_PART_SCROLLBAR);
        lv_obj_set_style_pad_top(id(speakers_container), 0, LV_PART_SCROLLBAR);
        lv_obj_set_style_pad_bottom(id(speakers_container), 0, LV_PART_SCROLLBAR);
        lv_indev_t *indev = lv_indev_get_next(NULL);
        if (indev) indev->driver->scroll_limit = 20;

  pages:
    - id: main_page
      scrollbar_mode: "off"
      scrollable: false
      width: 100%
      height: 100%
      bg_color: 0x000000
      pad_top: 0
      pad_bottom: 0
      pad_left: 0
      pad_right: 0

      widgets:
        # Colored backdrop behind artwork (visible for non-square TV art)
        - obj:
            id: artwork_bg_panel
            x: 0
            y: 0
            width: 480px
            height: 480px
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false

        # Full-screen artwork background
        - image:
            id: album_art_background_widget
            x: 0
            y: 0
            width: 480px
            height: 480px
            src: album_art_background
            opa: 100%

        # Error label: shown when album art download fails
        - label:
            id: artwork_error_label
            text: "Artwork unavailable"
            align: center
            y: -40
            width: 300px
            height: 30px
            text_font: roboto19_font
            text_color: 0x888888
            text_align: center
            hidden: true

        # Darkening layer over artwork (separate from text so transparency works)
        - obj:
            id: track_info_overlay
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 80%
            opa: 80%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            clickable: false

        # Track info text (transparent background, over darkening layer)
        - obj:
            id: track_info_text
            x: 0
            y: 0
            width: 480
            height: 480
            bg_opa: 0%
            radius: 0
            border_width: 0
            pad_left: 24
            pad_right: 24
            pad_top: 24
            pad_bottom: 16
            scrollable: false
            scrollbar_mode: "off"
            clickable: false
            layout:
              type: flex
              flex_flow: COLUMN
              pad_row: 0
            widgets:
              - label:
                  id: media_title_label
                  text: "—"
                  width: 100%
                  max_height: 330px
                  long_mode: wrap
                  text_font: roboto_light70_font
                  text_color: 0xFFFFFF
                  text_align: left
                  text_line_space: 0
              - label:
                  id: media_artist_label
                  text: ""
                  pad_top: 6
                  width: 100%
                  long_mode: dot
                  text_font: roboto_light40_font
                  text_color: 0xFFFFFF
                  text_opa: 80%
                  text_align: left
                  hidden: true
              - label:
                  id: media_time_label
                  text: "0:00  /  0:00"
                  pad_top: 12
                  width: 100%
                  text_font: roboto20_font
                  text_color: 0xFFFFFF
                  text_opa: 80%
                  text_align: left
                  on_click:
                    - switch.toggle: show_remaining_time

        # Media controls: previous, play/pause, next, shuffle (centered bottom)
        - obj:
            id: media_controls_container
            align: bottom_mid
            y: -24
            width: 370px
            height: 96px
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: space_evenly
              flex_align_cross: center
            widgets:
              # Previous track
              - button:
                  id: media_previous_button
                  width: 72px
                  height: 72px
                  styles: control_round
                  widgets:
                    - label:
                        text_font: icon_font_large
                        align: center
                        text: $skip_previous
                        text_color: 0xFFFFFF
                  on_press:
                    - script.execute: swipe_previous_track
              # Play/pause
              - button:
                  id: media_play_pause_button
                  width: 96px
                  height: 96px
                  styles: control_round
                  widgets:
                    - label:
                        id: media_play_icon
                        text_font: icon_font_large
                        align: center
                        text: $play
                        text_color: 0xFFFFFF
                        hidden: false
                    - label:
                        id: media_pause_icon
                        text_font: icon_font_large
                        align: center
                        text: $pause
                        text_color: 0xFFFFFF
                        hidden: true
                  on_press:
                    - homeassistant.service:
                        service: media_player.media_play_pause
                        variables:
                          target: !lambda |-
                            return id(is_tv_mode) ? id(tv_media_player_entity).state : id(media_player_entity).state;
                        data_template:
                          entity_id: "{{ target }}"
                        on_error:
                          - lambda: |-
                              if (!id(actions_prompt_acked) && !id(device_has_been_setup)) {
                                lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                              }
                    - logger.log: "Media: play_pause"
              # Next track
              - button:
                  id: media_next_button
                  width: 72px
                  height: 72px
                  styles: control_round
                  widgets:
                    - label:
                        text_font: icon_font_large
                        align: center
                        text: $skip_next
                        text_color: 0xFFFFFF
                  on_press:
                    - script.execute: swipe_next_track
              # Shuffle
              - button:
                  id: media_shuffle_button
                  width: 72px
                  height: 72px
                  styles: control_round
                  widgets:
                    - label:
                        id: media_shuffle_icon
                        text_font: icon_font_large
                        align: center
                        text: $icon_shuffle
                        text_color: 0xFFFFFF
                        text_opa: 50%
                  on_press:
                    - homeassistant.service:
                        service: media_player.shuffle_set
                        variables:
                          target: !lambda |-
                            return id(is_tv_mode) ? id(tv_media_player_entity).state : id(media_player_entity).state;
                          is_shuffle: !lambda |-
                            return id(shuffle_state) ? "false" : "true";
                        data_template:
                          entity_id: "{{ target }}"
                          shuffle: "{{ is_shuffle }}"
                    - logger.log: "Media: shuffle_toggle"

        # Progress bar: full screen width, at the very bottom of the screen
        - bar:
            id: media_progress_bar
            align: bottom_mid
            y: 0
            width: 480
            height: 6
            bg_color: 0x000000
            bg_opa: 50%
            radius: 0
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: 0xFFFFFF
              radius: 0

        # ---------------------------------------------------------------
        # SETUP PROMPT (no media player entity configured)
        # ---------------------------------------------------------------
        # Shown by subscribe_media_player when entity is empty.
        # Placed after controls so it covers them.
        # ---------------------------------------------------------------
        - obj:
            id: setup_prompt
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -80
                  text: $icon_cast
                  text_color: 0xFFFFFF
              - label:
                  text: "Media Player"
                  text_font: roboto30_font
                  text_color: 0xFFFFFF
                  align: center
                  y: -20
                  width: 400
                  height: 36
                  text_align: center
              - label:
                  text: "Set the media player entity\nyou want to control in\ndevice settings"
                  text_font: roboto19_font
                  text_color: 0x888888
                  align: center
                  y: 40
                  width: 400
                  height: 80
                  text_align: center

        # ---------------------------------------------------------------
        # ACTIONS PROMPT (enable HA actions toggle)
        # ---------------------------------------------------------------
        # One-time prompt shown after the media player entity is set.
        # Tap to dismiss; persisted via actions_prompt_acked global.
        # ---------------------------------------------------------------
        - obj:
            id: actions_prompt
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_left: 30
            pad_right: 30
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: 12
            widgets:
              - label:
                  text_font: $icon_font
                  text: $icon_shield
                  text_color: 0xFFFFFF
              - label:
                  text: "Enable Actions"
                  text_font: roboto30_font
                  text_color: 0xFFFFFF
                  width: 420
                  text_align: center
              - label:
                  id: actions_instructions
                  text: "In Home Assistant, go to\nSettings > Devices > ESPHome\nFind the device and enable\n'Allow the device to perform\nHome Assistant actions'"
                  text_font: roboto19_font
                  text_color: 0x888888
                  width: 420
                  text_align: center
              - button:
                  width: 180
                  height: 44
                  radius: 22
                  bg_color: 0xFFFFFF
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text: "Understood"
                        text_font: roboto19_font
                        text_color: 0x000000
                        align: center

        # ---------------------------------------------------------------
        # SETTINGS PANEL (swipe-down from top)
        # ---------------------------------------------------------------
        # Full-screen overlay, starts hidden. Shown/hidden instantly by
        # open_settings_panel / close_settings_panel scripts in device.yaml.
        # ---------------------------------------------------------------
        - obj:
            id: settings_panel
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              # Close button (top-right, visible when speakers are shown)
              - button:
                  id: speakers_close_button
                  align: top_right
                  x: -21
                  y: 26
                  width: 48px
                  height: 48px
                  radius: 24
                  bg_opa: 0%
                  border_width: 0
                  shadow_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $icon_close
                        text_color: 0xFFFFFF
                  on_press:
                    - script.execute: close_settings_panel

              # Title
              - label:
                  id: speakers_title_label
                  text: "Speakers"
                  text_font: roboto_light55_font
                  text_color: 0xFFFFFF
                  x: 20
                  y: 19
                  width: 400
                  text_align: left
                  hidden: true

              # Radio station buttons
              - obj:
                  id: radio_buttons_row
                  x: 0
                  y: 85
                  width: 100%
                  height: 50
                  bg_opa: 0%
                  border_width: 0
                  pad_left: 20
                  pad_right: 20
                  pad_top: 0
                  pad_bottom: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: ROW
                    pad_column: 16
                  widgets:
                    - button:
                        id: radio_station_1_button
                        width: 212
                        height: 50
                        radius: 25
                        bg_color: 0x212121
                        border_width: 0
                        shadow_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              text: "$icon_radio  ${radio_station_1_name}"
                              text_font: roboto19_font
                              text_color: 0xFFFFFF
                              align: center
                        on_press:
                          - homeassistant.service:
                              service: media_player.play_media
                              variables:
                                target: !lambda |-
                                  return id(media_player_entity).state;
                              data:
                                media_content_id: "${radio_station_1_content_id}"
                                media_content_type: favorite_item_id
                              data_template:
                                entity_id: "{{ target }}"
                          - script.execute: close_settings_panel
                    - button:
                        id: radio_station_2_button
                        width: 212
                        height: 50
                        radius: 25
                        bg_color: 0x212121
                        border_width: 0
                        shadow_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              text: "$icon_radio  ${radio_station_2_name}"
                              text_font: roboto19_font
                              text_color: 0xFFFFFF
                              align: center
                        on_press:
                          - homeassistant.service:
                              service: media_player.play_media
                              variables:
                                target: !lambda |-
                                  return id(media_player_entity).state;
                              data:
                                media_content_id: "${radio_station_2_content_id}"
                                media_content_type: favorite_item_id
                              data_template:
                                entity_id: "{{ target }}"
                          - script.execute: close_settings_panel

              # Speaker card grid (2-across)
              - obj:
                  id: speakers_container
                  x: 0
                  y: 150
                  width: 100%
                  height: 330
                  bg_opa: 0%
                  border_width: 0
                  pad_left: 20
                  pad_right: 20
                  pad_top: 0
                  pad_bottom: 16
                  scrollable: true
                  scrollbar_mode: auto
                  hidden: true
                  layout:
                    type: flex
                    flex_flow: ROW_WRAP
                    pad_row: 16
                    pad_column: 16
                  widgets:
                    # --- Group Volume card ---
                    - obj:
                        id: group_vol_card
                        width: 212
                        height: 180
                        radius: 24
                        bg_color: 0x212121
                        bg_opa: 100%
                        border_width: 0
                        pad_left: 20
                        pad_right: 20
                        pad_top: 20
                        pad_bottom: 20
                        scrollable: false
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          flex_align_main: space_between
                          flex_align_cross: start
                        widgets:
                          - obj:
                              width: 160
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: COLUMN
                                pad_row: 7
                              widgets:
                                - label:
                                    text: "Group"
                                    text_font: roboto30_font
                                    text_color: 0xFFFFFF
                                    width: 150
                                - label:
                                    id: group_vol_label
                                    text: ""
                                    text_font: roboto19_font
                                    text_color: 0xFFFFFF
                                    text_opa: 80%
                          - obj:
                              id: group_vol_btns
                              width: 122
                              height: 48
                              radius: 24
                              bg_color: 0x373737
                              bg_opa: 100%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: ROW
                                pad_column: 0
                              widgets:
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute: group_volume_down
                                    widgets:
                                      - label:
                                          text: "${icon_minus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center
                                - obj:
                                    width: 2
                                    height: 48
                                    bg_color: 0x212121
                                    bg_opa: 100%
                                    radius: 0
                                    border_width: 0
                                    pad_all: 0
                                    align: center
                                    clickable: false
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute: group_volume_up
                                    widgets:
                                      - label:
                                          text: "${icon_plus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center

                    # --- Card 0 (selected speaker / leader, no toggle) ---
                    - obj:
                        id: speaker_card_0
                        width: 212
                        height: 180
                        radius: 24
                        bg_color: 0x000000
                        bg_opa: 100%
                        border_width: 2
                        border_color: 0x373737
                        pad_left: 20
                        pad_right: 20
                        pad_top: 20
                        pad_bottom: 20
                        scrollable: false
                        hidden: true
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          flex_align_main: space_between
                          flex_align_cross: start
                        widgets:
                          - obj:
                              width: 160
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: COLUMN
                                pad_row: 7
                              widgets:
                                - label:
                                    id: speaker_name_0
                                    text: ""
                                    text_font: roboto30_font
                                    text_color: 0xFFFFFF
                                    width: 150
                                - label:
                                    id: speaker_vol_label_0
                                    text: ""
                                    text_font: roboto19_font
                                    text_color: 0xFFFFFF
                                    text_opa: 80%
                          - obj:
                              id: speaker_btns_0
                              width: 122
                              height: 48
                              radius: 24
                              bg_color: 0x373737
                              bg_opa: 100%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: ROW
                                pad_column: 0
                              widgets:
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute:
                                          id: speaker_volume_change
                                          slot: 0
                                          direction: -1
                                    widgets:
                                      - label:
                                          text: "${icon_minus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center
                                - obj:
                                    width: 2
                                    height: 48
                                    bg_color: 0x212121
                                    bg_opa: 100%
                                    radius: 0
                                    border_width: 0
                                    pad_all: 0
                                    align: center
                                    clickable: false
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute:
                                          id: speaker_volume_change
                                          slot: 0
                                          direction: 1
                                    widgets:
                                      - label:
                                          text: "${icon_plus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center

                    # --- Card 1 ---
                    - obj:
                        id: speaker_card_1
                        width: 212
                        height: 180
                        radius: 24
                        bg_color: 0x000000
                        bg_opa: 100%
                        border_width: 2
                        border_color: 0x373737
                        pad_left: 20
                        pad_right: 20
                        pad_top: 20
                        pad_bottom: 20
                        scrollable: false
                        hidden: true
                        clickable: true
                        on_click:
                          - script.execute:
                              id: speaker_toggle
                              slot: 1
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          flex_align_main: space_between
                          flex_align_cross: start
                        widgets:
                          - obj:
                              id: speaker_top_1
                              width: 160
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              on_click:
                                - script.execute:
                                    id: speaker_toggle
                                    slot: 1
                              layout:
                                type: flex
                                flex_flow: COLUMN
                                pad_row: 7
                              widgets:
                                - label:
                                    id: speaker_name_1
                                    text: ""
                                    text_font: roboto30_font
                                    text_color: 0xFFFFFF
                                    width: 150
                                - label:
                                    id: speaker_vol_label_1
                                    text: ""
                                    text_font: roboto19_font
                                    text_color: 0xFFFFFF
                                    text_opa: 80%
                          - obj:
                              id: speaker_btns_1
                              width: 122
                              height: 48
                              radius: 24
                              bg_color: 0x373737
                              bg_opa: 100%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: ROW
                                pad_column: 0
                              widgets:
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute:
                                          id: speaker_volume_change
                                          slot: 1
                                          direction: -1
                                    widgets:
                                      - label:
                                          text: "${icon_minus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center
                                - obj:
                                    width: 2
                                    height: 48
                                    bg_color: 0x212121
                                    bg_opa: 100%
                                    radius: 0
                                    border_width: 0
                                    pad_all: 0
                                    align: center
                                    clickable: false
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
                                    border_width: 0
                                    shadow_width: 0
                                    pad_all: 0
                                    on_click:
                                      - script.execute:
                                          id: speaker_volume_change
                                          slot: 1
                                          direction: 1
                                    widgets:
                                      - label:
                                          text: "${icon_plus}"
                                          text_font: icon_font_small
                                          text_color: 0xFFFFFF
                                          align: center

                    # --- Card 2 ---
                    - obj:
                        id: speaker_card_2
                        width: 212
                        height: 180
                        radius: 24
                        bg_color: 0x000000
                        bg_opa: 100%
                        border_width: 2
                        border_color: 0x373737
                        pad_left: 20
                        pad_right: 20
                        pad_top: 20
                        pad_bottom: 20
                        scrollable: false
                        hidden: true
                        clickable: true
                        on_click:
                          - script.execute:
                              id: speaker_toggle
                              slot: 2
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          flex_align_main: space_between
                          flex_align_cross: start
                        widgets:
                          - obj:
                              id: speaker_top_2
                              width: 160
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              on_click:
                                - script.execute:
                                    id: speaker_toggle
                                    slot: 2
                              layout:
                                type: flex
                                flex_flow: COLUMN
                                pad_row: 7
                              widgets:
                                - label:
                                    id: speaker_name_2
                                    text: ""
                                    text_font: roboto30_font
                                    text_color: 0xFFFFFF
                                    width: 150
                                - label:
                                    id: speaker_vol_label_2
                                    text: ""
                                    text_font: roboto19_font
                                    text_color: 0xFFFFFF
                                    text_opa: 80%
                          - obj:
                              id: speaker_btns_2
                              width: 122
                              height: 48
                              radius: 24
                              bg_color: 0x373737
                              bg_opa: 100%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: ROW
                                pad_column: 0
                              widgets:
                                - button:
                                    width: 60
                                    height: 48
                                    radius: 0
                                    bg_opa: 0%
