# http://materialdesignicons.com/cdn/7.4.47/
# Icons used by the music dashboard and setup screens (device/lvgl.yaml).
# MaterialDesign-Webfont TTF uses codepoints in the PUA (U+F0xxx).

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icon_font
    size: 40
    bpp: 4
    glyphs:
      - "\U000F040A" # mdi-play
      - "\U000F03E4" # mdi-pause
      - "\U000F0415" # mdi-plus
      - "\U000F0374" # mdi-minus
      - "\U000F05A9" # mdi-wifi
      - "\U000F07D0" # mdi-home-assistant
      - "\U000F0118" # mdi-cast
      - "\U000F0565" # mdi-shield-check
      - "\U000F0502" # mdi-television
      - "\U000F0D38" # mdi-speaker-multiple
      - "\U000F0156" # mdi-close
      - "\U000F0444" # mdi-radio
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icon_font_small
    size: 24
    bpp: 4
    glyphs:
      - "\U000F0415" # mdi-plus
      - "\U000F0374" # mdi-minus
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icon_font_large
    size: 56
    bpp: 4
    glyphs:
      - "\U000F040A" # mdi-play
      - "\U000F03E4" # mdi-pause
      - "\U000F04AD" # mdi-skip-next
      - "\U000F04AE" # mdi-skip-previous
      - "\U000F049D" # mdi-shuffle

substitutions:
  play: "\U000F040A"
  pause: "\U000F03E4"
  skip_next: "\U000F04AD"
  skip_previous: "\U000F04AE"
  icon_shuffle: "\U000F049D"
  icon_plus: "\U000F0415"
  icon_minus: "\U000F0374"
  icon_wifi: "\U000F05A9"
  icon_ha: "\U000F07D0"
  icon_cast: "\U000F0118"
  icon_shield: "\U000F0565"
  tv_icon: "\U000F0502"
  icon_speakers: "\U000F0D38"
  icon_close: "\U000F0156"
  icon_radio: "\U000F0444"
