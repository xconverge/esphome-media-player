# =============================================================================
# SPEAKER DISCOVERY - Home Assistant Setup
# =============================================================================
# Create a template sensor in your Home Assistant configuration.yaml so the
# ESPHome panel can auto-discover your speakers for the grouping UI.
#
# Works with any integration that exposes media_player entities and supports
# media_player.join / media_player.unjoin (e.g. Sonos, Google Cast, HEOS,
# MusicCast, LinkPlay, Bluesound).
#
# Add the following to your configuration.yaml (replace "sonos" with your
# integration name), then restart Home Assistant:
#
template:
  - sensor:
      - name: "Speaker Group"
        state: >
          {%- set s = integration_entities("sonos") | select("match", "media_player") | list -%}
          {{ s | count }}
        attributes:
          data: >
            {%- set s = integration_entities("sonos") | select("match", "media_player") | list -%}
            {{ s | map("replace", "media_player.", "") | join(",") }}|{{ s | map("state_attr", "friendly_name") | join(",") }}|{{ s | map("state_attr", "volume_level") | join(",") }}
#
# Done. The ESPHome panel picks up this sensor automatically.
#
# To verify, check Developer Tools > States:
#   sensor.speaker_group → state: 6 (count of speakers)
#   data attribute → e.g. office,kitchen|Office,Kitchen|0.45,0.6
# =============================================================================
