# =============================================================================
# WARM TONES - Day/night screen color temperature
# =============================================================================
# Shifts album art toward warm tones (reduced blue, slight red boost).
# Separate day and night warmth sliders follow the same sun/sensor-based
# day/night detection used by the backlight brightness system.
#
# The tint is applied directly to the RGB565 image buffer after accent color
# extraction, using precomputed lookup tables for speed. The undo/redo
# pattern allows changing warmth without reloading the image.
# =============================================================================


# -----------------------------------------------------------------------------
# Last applied warmth (for undo/redo) and retint flag
# -----------------------------------------------------------------------------
globals:
  - id: warm_tone_last_w
    type: float
    initial_value: '0.0f'
  - id: warm_tone_retint
    type: bool
    initial_value: 'false'


# -----------------------------------------------------------------------------
# HA sliders: Day / Night warmth (0–100%)
# -----------------------------------------------------------------------------
number:
  - platform: template
    name: "Day: Screen Warmth"
    id: screen_warmth_day
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:white-balance-sunny"
    entity_category: config
    on_value:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones

  - platform: template
    name: "Night: Screen Warmth"
    id: screen_warmth_night
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:weather-night"
    entity_category: config
    on_value:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones


# -----------------------------------------------------------------------------
# Apply warmth to current image buffer (LUT-based RGB565 tint)
# -----------------------------------------------------------------------------
script:
  - id: apply_warm_tones
    mode: restart
    then:
      - lambda: |-
          bool retint = id(warm_tone_retint);
          id(warm_tone_retint) = false;

          bool is_day = id(day_night_sensor_entity).state.empty()
              ? (id(sun_state_sensor).has_state() && id(sun_state_sensor).state == "above_horizon")
              : id(custom_day_night_is_day);
          float w = (is_day ? id(screen_warmth_day).state : id(screen_warmth_night).state) / 100.0f;
          float last_w = retint ? id(warm_tone_last_w) : 0.0f;

          if (fabsf(w - last_w) < 0.01f) return;

          ESP_LOGI("warm", "Warmth: %d%% -> %d%%", (int)(last_w * 100.0f + 0.5f), (int)(w * 100.0f + 0.5f));

          float r_undo = (last_w > 0.005f) ? 1.0f / (1.0f + last_w * 0.12f) : 1.0f;
          float g_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * 0.14f) : 1.0f;
          float b_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * 0.45f) : 1.0f;
          float r_apply = 1.0f + w * 0.12f;
          float g_apply = 1.0f - w * 0.14f;
          float b_apply = 1.0f - w * 0.45f;

          uint8_t r_lut[32], g_lut[64], b_lut[32];
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * r_undo * r_apply);
            r_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }
          for (int i = 0; i < 64; i++) {
            int v = (i << 2) | (i >> 4);
            int nv = (int)(v * g_undo * g_apply);
            g_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 2);
          }
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * b_undo * b_apply);
            b_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }

          auto *img = id(is_tv_mode) ? id(tv_art_background) : id(album_art_background);
          if (!img) return;
          #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 4, 0)
          auto *dsc = img->get_lv_image_dsc();
          #else
          auto *dsc = img->get_lv_img_dsc();
          #endif
          if (!dsc || !dsc->data) return;
          uint8_t *buf = const_cast<uint8_t*>(dsc->data);
          int total = img->get_width() * img->get_height();
          for (int i = 0; i < total; i++) {
            int pos = i * 2;
            uint16_t px = buf[pos] | (buf[pos + 1] << 8);
            uint8_t r5 = r_lut[(px >> 11) & 0x1F];
            uint8_t g6 = g_lut[(px >> 5) & 0x3F];
            uint8_t b5 = b_lut[px & 0x1F];
            uint16_t out = (r5 << 11) | (g6 << 5) | b5;
            buf[pos]     = out & 0xFF;
            buf[pos + 1] = (out >> 8) & 0xFF;
          }

          lv_obj_invalidate(id(album_art_background_widget));
          id(warm_tone_last_w) = w;
