# =============================================================================
# BACKLIGHT & SCREENSAVER
# =============================================================================
# Two-stage screensaver with day/night awareness:
#   1. After dim_timeout seconds of inactivity → dim to day or night brightness
#   2. After a further off_timeout seconds → turn backlight off completely
#   Any touch or media-stop event restarts the cycle at 100%.
#
# All settings (brightness levels, timeouts) are exposed to Home Assistant
# as configurable number entities under the device's "Configuration" section.
# Sun state (above/below horizon) is read from HA's built-in sun.sun entity.
# =============================================================================


# -----------------------------------------------------------------------------
# BACKLIGHT LIGHT OUTPUT
# -----------------------------------------------------------------------------
esphome:
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 500ms
      - script.execute: backlight_wake_timeout


light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    internal: true


# -----------------------------------------------------------------------------
# SUN STATE SENSOR (from Home Assistant)
# -----------------------------------------------------------------------------
# Every HA instance has sun.sun by default. Its state is either
# "above_horizon" (daytime) or "below_horizon" (nighttime).
# -----------------------------------------------------------------------------
text_sensor:
  - platform: homeassistant
    entity_id: sun.sun
    id: sun_state_sensor
    internal: true


# -----------------------------------------------------------------------------
# USER-CONFIGURABLE SETTINGS (exposed to Home Assistant)
# -----------------------------------------------------------------------------
# These appear as number entities under the device's Configuration section.
# Values persist across reboots via restore_value + restore_from_flash.
# -----------------------------------------------------------------------------
number:
  - platform: template
    name: "Day: Active Brightness"
    id: backlight_day_active_brightness
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-7"
    entity_category: config
    set_action:
      - if:
          condition:
            lambda: 'return !id(is_screen_dimmed);'
          then:
            - light.turn_on:
                id: backlight
                brightness: !lambda |-
                  bool is_day = id(sun_state_sensor).has_state() &&
                                id(sun_state_sensor).state == "above_horizon";
                  return (is_day ? x : id(backlight_night_active_brightness).state) / 100.0f;
                transition_length: 500ms

  - platform: template
    name: "Night: Active Brightness"
    id: backlight_night_active_brightness
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 80
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-4"
    entity_category: config
    set_action:
      - if:
          condition:
            lambda: 'return !id(is_screen_dimmed);'
          then:
            - light.turn_on:
                id: backlight
                brightness: !lambda |-
                  bool is_day = id(sun_state_sensor).has_state() &&
                                id(sun_state_sensor).state == "above_horizon";
                  return (is_day ? id(backlight_day_active_brightness).state : x) / 100.0f;
                transition_length: 500ms

  - platform: template
    name: "Day: Dim Brightness"
    id: backlight_day_brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 35
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-5"
    entity_category: config

  - platform: template
    name: "Night: Dim Brightness"
    id: backlight_night_brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 25
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-3"
    entity_category: config

  - platform: template
    name: "Timeout: Dimming"
    id: backlight_dim_timeout
    min_value: 1
    max_value: 300
    step: 1
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config

  - platform: template
    name: "Timeout: Screen Off"
    id: backlight_off_timeout
    min_value: 1
    max_value: 600
    step: 1
    initial_value: 300
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-off-outline"
    entity_category: config

  - platform: template
    name: "Clock: Brightness"
    id: clock_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:clock-outline"
    entity_category: config

  - platform: template
    name: "Clock: Timeout"
    id: clock_start_timeout
    min_value: 1
    max_value: 300
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:clock-start"
    entity_category: config


# -----------------------------------------------------------------------------
# SCREENSAVER ENABLE/DISABLE (exposed to Home Assistant)
# -----------------------------------------------------------------------------
# Toggle switches to enable or disable the screen-off stage independently
# for daytime and nighttime. When disabled, the screen stays dimmed but
# never turns off completely. Both default to ON (screensaver enabled).
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Day: Screen Saver"
    id: backlight_day_screen_off
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:monitor-off"
    entity_category: config

  - platform: template
    name: "Night: Screen Saver"
    id: backlight_night_screen_off
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:monitor-off"
    entity_category: config

  - platform: template
    name: "Clock Screensaver"
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:clock-outline"
    entity_category: config


# -----------------------------------------------------------------------------
# BACKLIGHT WAKE / DIM / OFF SCRIPT
# -----------------------------------------------------------------------------
# mode: restart — any touch re-executes from the top, cancelling pending
# delays. This gives instant wake-up from any state (dimmed, clock, or off).
#
# Flow:
#   1. Wake: hide clock if showing, restore active brightness, resume LVGL
#   2. Wait clock_start_timeout (clock) or dim_timeout (no clock) seconds
#   3. If media is NOT playing:
#      a. Clock enabled → show clock at clock brightness
#      b. Clock disabled → dim to day/night brightness,
#         then optionally turn off after off_timeout
# -----------------------------------------------------------------------------
script:
  - id: backlight_wake_timeout
    mode: restart
    then:
      - lambda: |-
          id(was_screen_dimmed) = id(is_screen_dimmed);
          id(is_screen_dimmed) = false;
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            bool is_day = id(sun_state_sensor).has_state() &&
                          id(sun_state_sensor).state == "above_horizon";
            float pct = is_day
              ? id(backlight_day_active_brightness).state
              : id(backlight_night_active_brightness).state;
            return pct / 100.0f;
          transition_length: 1s
      - lvgl.resume:
      - if:
          condition:
            lambda: 'return id(was_screen_dimmed);'
          then:
            - script.execute: hide_clock_view
            - script.execute: show_track_view
      - delay: !lambda |-
          float t = id(clock_screensaver_enabled).state
            ? id(clock_start_timeout).state
            : id(backlight_dim_timeout).state;
          return (uint32_t)(t * 1000);
      - if:
          condition:
            lambda: >-
              return !id(media_player_state_sensor).has_state() ||
                     id(media_player_state_sensor).state != "playing";
          then:
            - lambda: 'id(is_screen_dimmed) = true;'
            - if:
                condition:
                  lambda: 'return id(clock_screensaver_enabled).state;'
                then:
                  - script.execute: show_clock_view
                else:
                  - light.turn_on:
                      id: backlight
                      brightness: !lambda |-
                        bool is_day = id(sun_state_sensor).has_state() &&
                                      id(sun_state_sensor).state == "above_horizon";
                        float pct = is_day
                          ? id(backlight_day_brightness).state
                          : id(backlight_night_brightness).state;
                        return pct / 100.0f;
                      transition_length: 3s
                  - if:
                      condition:
                        lambda: |-
                          bool is_day = id(sun_state_sensor).has_state() &&
                                        id(sun_state_sensor).state == "above_horizon";
                          return is_day
                            ? id(backlight_day_screen_off).state
                            : id(backlight_night_screen_off).state;
                      then:
                        - delay: !lambda 'return (uint32_t)(id(backlight_off_timeout).state * 1000);'
                        - light.turn_off:
                            id: backlight
                            transition_length: 3s
                        - lvgl.pause:

  - id: show_clock_view
    mode: single
    then:
      - lambda: |-
          id(is_clock_showing) = true;
          auto time = id(ha_time).now();
          if (time.is_valid()) {
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(clock_label), buf);
            lv_obj_update_layout(id(clock_label));
            lv_coord_t w = lv_obj_get_width(id(clock_label));
            lv_coord_t h = lv_obj_get_height(id(clock_label));
            int cx = 640, cy = 400;
            int ox = (time.minute * 7) % 61 - 30;
            int oy = (time.minute * 13) % 41 - 20;
            lv_obj_set_pos(id(clock_label), cx + ox - w/2, cy + oy - h/2);
          }
      - lvgl.widget.show: clock_screensaver
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(clock_brightness).state / 100.0f;'
          transition_length: 3s

  - id: hide_clock_view
    mode: single
    then:
      - lambda: 'id(is_clock_showing) = false;'
      - lvgl.widget.hide: clock_screensaver


# -----------------------------------------------------------------------------
# CLOCK UPDATE INTERVAL
# -----------------------------------------------------------------------------
# Every 30 s, refresh the time text and drift the label position to prevent
# burn-in. The position is derived from the current minute so it changes
# deterministically ~once per minute across a 60×40 px region.
# -----------------------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - lambda: |-
          if (!id(is_clock_showing)) return;
          auto time = id(ha_time).now();
          if (!time.is_valid()) return;
          char buf[6];
          snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
          lv_label_set_text(id(clock_label), buf);
          lv_obj_update_layout(id(clock_label));
          lv_coord_t w = lv_obj_get_width(id(clock_label));
          lv_coord_t h = lv_obj_get_height(id(clock_label));
          int cx = 640, cy = 400;
          int ox = (time.minute * 7) % 61 - 30;
          int oy = (time.minute * 13) % 41 - 20;
          lv_obj_set_pos(id(clock_label), cx + ox - w/2, cy + oy - h/2);
