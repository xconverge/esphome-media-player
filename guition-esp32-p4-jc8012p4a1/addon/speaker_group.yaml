# =============================================================================
# SPEAKER GROUPING - Sonos multi-room control
# =============================================================================
# Subscribes to a HA template sensor (sensor.sonos_speakers) that auto-discovers
# Sonos media_player entities, and to the group_members attribute on the
# currently selected media player. Provides scripts to parse the data, update
# the LVGL grouping panel, and call media_player.join / unjoin.
#
# Requires: homeassistant/sonos_speakers.yaml installed in HA packages/.
# =============================================================================

globals:
  - id: speaker_count
    type: int
    initial_value: '0'
  - id: speaker_entity_ids
    type: std::string[8]
  - id: speaker_names
    type: std::string[8]
  - id: speaker_grouped
    type: bool[8]
    initial_value: '{false}'
  - id: speaker_join_member
    type: std::string
    initial_value: '""'
  - id: speaker_unjoin_target
    type: std::string
    initial_value: '""'
  - id: speaker_vol_target
    type: std::string
    initial_value: '""'
  - id: group_vol_index
    type: int
    initial_value: '0'
  - id: speaker_volumes
    type: float[8]
    initial_value: '{0.0f}'
  - id: prev_arc_value
    type: int
    initial_value: '-1'

text_sensor:
  - platform: homeassistant
    id: sonos_entity_ids_sensor
    entity_id: sensor.sonos_speaker_ids
    on_value:
      - script.execute: parse_speakers

  - platform: homeassistant
    id: sonos_names_sensor
    entity_id: sensor.sonos_speaker_names
    on_value:
      - script.execute: parse_speakers

  - platform: homeassistant
    id: sonos_volumes_sensor
    entity_id: sensor.sonos_speaker_volumes
    on_value:
      - script.execute: parse_speaker_volumes

  - platform: template
    id: group_members_sensor
    on_value:
      - script.execute: update_group_state

script:
  # ---------------------------------------------------------------------------
  # Parse the comma-separated entity_ids and names from the HA template sensor
  # into fixed-size global arrays. Then refresh the LVGL panel.
  # ---------------------------------------------------------------------------
  - id: parse_speakers
    mode: restart
    then:
      - lambda: |-
          std::string ids_raw = id(sonos_entity_ids_sensor).state;
          std::string names_raw = id(sonos_names_sensor).has_state()
              ? id(sonos_names_sensor).state : "";

          // Reset
          id(speaker_count) = 0;
          for (int i = 0; i < 8; i++) {
            id(speaker_entity_ids)[i] = "";
            id(speaker_names)[i] = "";
            id(speaker_grouped)[i] = false;
          }

          if (ids_raw.empty() || ids_raw == "None" || ids_raw == "unknown") {
            ESP_LOGW("speaker_group", "No Sonos speakers found");
            lv_obj_add_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          // Parse entity_ids
          std::vector<std::string> ids;
          size_t start = 0, end;
          while ((end = ids_raw.find(',', start)) != std::string::npos && ids.size() < 8) {
            std::string token = ids_raw.substr(start, end - start);
            while (!token.empty() && token.front() == ' ') token.erase(0, 1);
            while (!token.empty() && token.back() == ' ') token.pop_back();
            if (!token.empty()) ids.push_back(token);
            start = end + 1;
          }
          if (start < ids_raw.size() && ids.size() < 8) {
            std::string token = ids_raw.substr(start);
            while (!token.empty() && token.front() == ' ') token.erase(0, 1);
            while (!token.empty() && token.back() == ' ') token.pop_back();
            if (!token.empty()) ids.push_back(token);
          }

          // Parse names (same delimiter)
          std::vector<std::string> names;
          start = 0;
          while ((end = names_raw.find(',', start)) != std::string::npos && names.size() < 8) {
            std::string token = names_raw.substr(start, end - start);
            while (!token.empty() && token.front() == ' ') token.erase(0, 1);
            while (!token.empty() && token.back() == ' ') token.pop_back();
            if (!token.empty()) names.push_back(token);
            start = end + 1;
          }
          if (start < names_raw.size() && names.size() < 8) {
            std::string token = names_raw.substr(start);
            while (!token.empty() && token.front() == ' ') token.erase(0, 1);
            while (!token.empty() && token.back() == ' ') token.pop_back();
            if (!token.empty()) names.push_back(token);
          }

          // Store into globals, putting the selected media player first
          std::string selected = id(media_player_entity).state;
          int count = 0;

          // Selected player goes in slot 0 — if it's not in the Sonos list,
          // this device isn't controlling a Sonos speaker so hide grouping.
          bool found_selected = false;
          for (size_t i = 0; i < ids.size(); i++) {
            if (ids[i] == selected) {
              id(speaker_entity_ids)[0] = ids[i];
              id(speaker_names)[0] = (i < names.size()) ? names[i] : ids[i];
              id(speaker_grouped)[0] = true;
              count = 1;
              found_selected = true;
              break;
            }
          }

          if (!found_selected) {
            ESP_LOGD("speaker_group", "Selected player '%s' is not a Sonos device", selected.c_str());
            lv_obj_add_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          // Remaining speakers fill slots 1..7
          for (size_t i = 0; i < ids.size() && count < 8; i++) {
            if (ids[i] != selected) {
              id(speaker_entity_ids)[count] = ids[i];
              id(speaker_names)[count] = (i < names.size()) ? names[i] : ids[i];
              count++;
            }
          }

          id(speaker_count) = count;
          ESP_LOGI("speaker_group", "Discovered %d Sonos speakers", count);

          if (count > 1) {
            lv_obj_clear_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
          }

      - script.execute: update_group_state
      - script.execute: parse_speaker_volumes

  # ---------------------------------------------------------------------------
  # Parse volume levels from the HA template sensor and map them to speaker
  # slots using entity ID matching. Volumes arrive in sensor discovery order;
  # we need them in our slot order.
  # ---------------------------------------------------------------------------
  - id: parse_speaker_volumes
    mode: restart
    then:
      - lambda: |-
          if (!id(sonos_volumes_sensor).has_state() || !id(sonos_entity_ids_sensor).has_state())
            return;

          std::string vols_raw = id(sonos_volumes_sensor).state;
          std::string ids_raw = id(sonos_entity_ids_sensor).state;

          if (vols_raw.empty() || vols_raw == "unknown" || vols_raw == "None") return;

          // Parse sensor-order entity IDs
          std::vector<std::string> sensor_ids;
          size_t start = 0, end;
          while ((end = ids_raw.find(',', start)) != std::string::npos && sensor_ids.size() < 8) {
            std::string t = ids_raw.substr(start, end - start);
            while (!t.empty() && t.front() == ' ') t.erase(0, 1);
            while (!t.empty() && t.back() == ' ') t.pop_back();
            if (!t.empty()) sensor_ids.push_back(t);
            start = end + 1;
          }
          if (start < ids_raw.size() && sensor_ids.size() < 8) {
            std::string t = ids_raw.substr(start);
            while (!t.empty() && t.front() == ' ') t.erase(0, 1);
            while (!t.empty() && t.back() == ' ') t.pop_back();
            if (!t.empty()) sensor_ids.push_back(t);
          }

          // Parse sensor-order volumes
          std::vector<float> sensor_vols;
          start = 0;
          while ((end = vols_raw.find(',', start)) != std::string::npos && sensor_vols.size() < 8) {
            std::string t = vols_raw.substr(start, end - start);
            while (!t.empty() && t.front() == ' ') t.erase(0, 1);
            while (!t.empty() && t.back() == ' ') t.pop_back();
            auto v = esphome::parse_number<float>(t);
            sensor_vols.push_back(v.has_value() ? v.value() : 0.0f);
            start = end + 1;
          }
          if (start < vols_raw.size() && sensor_vols.size() < 8) {
            std::string t = vols_raw.substr(start);
            while (!t.empty() && t.front() == ' ') t.erase(0, 1);
            while (!t.empty() && t.back() == ' ') t.pop_back();
            auto v = esphome::parse_number<float>(t);
            sensor_vols.push_back(v.has_value() ? v.value() : 0.0f);
          }

          // Map sensor-order volumes to slot-order by matching entity IDs
          for (int slot = 0; slot < id(speaker_count); slot++) {
            for (size_t s = 0; s < sensor_ids.size(); s++) {
              if (sensor_ids[s] == id(speaker_entity_ids)[slot] && s < sensor_vols.size()) {
                id(speaker_volumes)[slot] = sensor_vols[s];
                break;
              }
            }
          }

          // Sync the arc to the primary speaker's volume
          int primary_pct = (int)(id(speaker_volumes)[0] * 100.0f);
          id(prev_arc_value) = primary_pct;

  # ---------------------------------------------------------------------------
  # Parse group_members and update the grouped state for each speaker slot.
  # group_members arrives as a string like: media_player.a, media_player.b
  # (HA native API serializes lists with comma separation).
  # ---------------------------------------------------------------------------
  - id: update_group_state
    mode: restart
    then:
      - lambda: |-
          std::string raw = id(group_members_sensor).has_state()
              ? id(group_members_sensor).state : "";

          // Strip Python-style list brackets and quotes if present
          while (!raw.empty() && (raw.front() == '[' || raw.front() == '\'' || raw.front() == '"' || raw.front() == ' '))
            raw.erase(0, 1);
          while (!raw.empty() && (raw.back() == ']' || raw.back() == '\'' || raw.back() == '"' || raw.back() == ' '))
            raw.pop_back();

          // Parse into a set of entity IDs
          std::vector<std::string> members;
          size_t start = 0, end;
          while ((end = raw.find(',', start)) != std::string::npos) {
            std::string token = raw.substr(start, end - start);
            // Strip whitespace and quotes from each token
            while (!token.empty() && (token.front() == ' ' || token.front() == '\'' || token.front() == '"'))
              token.erase(0, 1);
            while (!token.empty() && (token.back() == ' ' || token.back() == '\'' || token.back() == '"'))
              token.pop_back();
            if (!token.empty()) members.push_back(token);
            start = end + 1;
          }
          if (start < raw.size()) {
            std::string token = raw.substr(start);
            while (!token.empty() && (token.front() == ' ' || token.front() == '\'' || token.front() == '"'))
              token.erase(0, 1);
            while (!token.empty() && (token.back() == ' ' || token.back() == '\'' || token.back() == '"'))
              token.pop_back();
            if (!token.empty()) members.push_back(token);
          }

          // Slot 0 (selected player) is always grouped
          id(speaker_grouped)[0] = true;

          // For slots 1..7, check membership
          int count = id(speaker_count);
          for (int i = 1; i < count; i++) {
            bool found = false;
            for (auto &m : members) {
              if (m == id(speaker_entity_ids)[i]) {
                found = true;
                break;
              }
            }
            id(speaker_grouped)[i] = found;
          }

          // Sort slots 1..N so grouped speakers appear first
          for (int i = 1; i < count - 1; i++) {
            for (int j = i + 1; j < count; j++) {
              if (!id(speaker_grouped)[i] && id(speaker_grouped)[j]) {
                std::swap(id(speaker_entity_ids)[i], id(speaker_entity_ids)[j]);
                std::swap(id(speaker_names)[i], id(speaker_names)[j]);
                std::swap(id(speaker_grouped)[i], id(speaker_grouped)[j]);
                std::swap(id(speaker_volumes)[i], id(speaker_volumes)[j]);
              }
            }
          }

      - script.execute: update_grouping_panel

  # ---------------------------------------------------------------------------
  # Refresh LVGL panel: set labels, switch states, and row visibility.
  # ---------------------------------------------------------------------------
  - id: update_grouping_panel
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *name_labels[] = {
            id(speaker_name_0), id(speaker_name_1), id(speaker_name_2), id(speaker_name_3),
            id(speaker_name_4), id(speaker_name_5), id(speaker_name_6), id(speaker_name_7)
          };
          lv_obj_t *switches[] = {
            id(speaker_sw_0), id(speaker_sw_1), id(speaker_sw_2), id(speaker_sw_3),
            id(speaker_sw_4), id(speaker_sw_5), id(speaker_sw_6), id(speaker_sw_7)
          };
          lv_obj_t *rows[] = {
            id(speaker_row_0), id(speaker_row_1), id(speaker_row_2), id(speaker_row_3),
            id(speaker_row_4), id(speaker_row_5), id(speaker_row_6), id(speaker_row_7)
          };
          lv_obj_t *vol_down[] = {
            id(speaker_vol_down_0), id(speaker_vol_down_1), id(speaker_vol_down_2), id(speaker_vol_down_3),
            id(speaker_vol_down_4), id(speaker_vol_down_5), id(speaker_vol_down_6), id(speaker_vol_down_7)
          };
          lv_obj_t *vol_up[] = {
            id(speaker_vol_up_0), id(speaker_vol_up_1), id(speaker_vol_up_2), id(speaker_vol_up_3),
            id(speaker_vol_up_4), id(speaker_vol_up_5), id(speaker_vol_up_6), id(speaker_vol_up_7)
          };

          for (int i = 0; i < 8; i++) {
            if (i < id(speaker_count)) {
              lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(name_labels[i], id(speaker_names)[i].c_str());

              if (id(speaker_grouped)[i]) {
                lv_obj_add_state(switches[i], LV_STATE_CHECKED);
                lv_obj_clear_flag(vol_down[i], LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(vol_up[i], LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_clear_state(switches[i], LV_STATE_CHECKED);
                lv_obj_add_flag(vol_down[i], LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(vol_up[i], LV_OBJ_FLAG_HIDDEN);
              }

              if (i == 0) {
                lv_obj_add_state(switches[i], LV_STATE_DISABLED);
              } else {
                lv_obj_clear_state(switches[i], LV_STATE_DISABLED);
              }
            } else {
              lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

  # ---------------------------------------------------------------------------
  # Join / unjoin a speaker by slot index (stored in a global before calling).
  # ---------------------------------------------------------------------------
  - id: speaker_toggle
    mode: single
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= id(speaker_count) || slot == 0) return;
          bool currently_grouped = id(speaker_grouped)[slot];

          if (currently_grouped) {
            // Unjoin: target is the speaker being removed
            id(speaker_unjoin_target) = id(speaker_entity_ids)[slot];
            id(do_speaker_unjoin).execute();
          } else {
            // Join: target is the leader, member is the speaker being added
            id(speaker_join_member) = id(speaker_entity_ids)[slot];
            id(do_speaker_join).execute();
          }

  - id: do_speaker_join
    mode: single
    then:
      - homeassistant.service:
          service: media_player.join
          variables:
            target: !lambda 'return id(media_player_entity).state;'
            member: !lambda 'return id(speaker_join_member);'
          data_template:
            entity_id: "{{ target }}"
            group_members: "{{ member }}"
          on_error:
            - logger.log:
                level: ERROR
                tag: speaker_group
                format: "Failed to join speaker"
      - logger.log:
          tag: speaker_group
          format: "Joined speaker to group"

  - id: do_speaker_unjoin
    mode: single
    then:
      - homeassistant.service:
          service: media_player.unjoin
          variables:
            target: !lambda 'return id(speaker_unjoin_target);'
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - logger.log:
                level: ERROR
                tag: speaker_group
                format: "Failed to unjoin speaker"
      - logger.log:
          tag: speaker_group
          format: "Removed speaker from group"

  # ---------------------------------------------------------------------------
  # Per-speaker volume control
  # ---------------------------------------------------------------------------
  - id: speaker_volume_down
    mode: single
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= id(speaker_count)) return;
          id(speaker_vol_target) = id(speaker_entity_ids)[slot];
          id(do_speaker_volume_down).execute();

  - id: speaker_volume_up
    mode: single
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= id(speaker_count)) return;
          id(speaker_vol_target) = id(speaker_entity_ids)[slot];
          id(do_speaker_volume_up).execute();

  - id: do_speaker_volume_down
    mode: single
    then:
      - homeassistant.service:
          service: media_player.volume_down
          variables:
            target: !lambda 'return id(speaker_vol_target);'
          data_template:
            entity_id: "{{ target }}"

  - id: do_speaker_volume_up
    mode: single
    then:
      - homeassistant.service:
          service: media_player.volume_up
          variables:
            target: !lambda 'return id(speaker_vol_target);'
          data_template:
            entity_id: "{{ target }}"

  # ---------------------------------------------------------------------------
  # Group volume: adjusts all grouped speakers relative to their current level.
  # Computes the delta from the previous arc position and applies it to each
  # speaker's tracked volume, keeping their relative balance intact.
  # Debounced so rapid arc dragging doesn't flood HA with requests.
  # ---------------------------------------------------------------------------
  - id: debounce_group_volume
    mode: restart
    then:
      - delay: 150ms
      - lambda: |-
          int new_val = lv_arc_get_value(id(volume_arc));
          int prev = id(prev_arc_value);

          // First interaction or no speakers — just set the primary
          if (prev < 0 || id(speaker_count) < 2) {
            id(prev_arc_value) = new_val;
            id(speaker_volumes)[0] = new_val / 100.0f;
            id(speaker_vol_target) = id(media_player_entity).state;
            id(do_group_volume_set).execute();
            return;
          }

          float delta = (new_val - prev) / 100.0f;
          id(prev_arc_value) = new_val;

          // Apply delta to each grouped speaker's tracked volume
          for (int i = 0; i < id(speaker_count); i++) {
            if (id(speaker_grouped)[i]) {
              float v = id(speaker_volumes)[i] + delta;
              if (v < 0.0f) v = 0.0f;
              if (v > 1.0f) v = 1.0f;
              id(speaker_volumes)[i] = v;
            }
          }

          id(group_vol_index) = 0;
      - script.execute: group_volume_next

  - id: group_volume_next
    mode: single
    then:
      - lambda: |-
          int i = id(group_vol_index);
          int count = id(speaker_count);

          while (i < count && !id(speaker_grouped)[i]) {
            i++;
          }

          if (i >= count) return;

          id(speaker_vol_target) = id(speaker_entity_ids)[i];
          id(group_vol_index) = i + 1;
          id(do_group_volume_set).execute();

  - id: do_group_volume_set
    mode: single
    then:
      - homeassistant.service:
          service: media_player.volume_set
          variables:
            target: !lambda 'return id(speaker_vol_target);'
            vol_level: !lambda |-
              // Find the slot for this target and return its tracked volume
              for (int i = 0; i < id(speaker_count); i++) {
                if (id(speaker_entity_ids)[i] == id(speaker_vol_target)) {
                  return id(speaker_volumes)[i];
                }
              }
              return lv_arc_get_value(id(volume_arc)) / 100.0f;
          data_template:
            entity_id: "{{ target }}"
            volume_level: "{{ vol_level }}"
      - script.execute: group_volume_next
