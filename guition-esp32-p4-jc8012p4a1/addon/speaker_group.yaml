# =============================================================================
# SPEAKER GROUPING - Multi-room control
# =============================================================================
# Subscribes to a HA template sensor (sensor.speaker_group) that discovers
# media_player entities from a configured integration, and to the
# group_members attribute on the currently selected media player. Provides
# scripts to parse the data, update the LVGL grouping panel, and call
# media_player.join / unjoin.
#
# Requires: homeassistant/speakers.yaml template sensor in HA.
# =============================================================================

globals:
  - id: speaker_count
    type: int
    initial_value: '0'
  - id: speaker_entity_ids
    type: std::string[16]
  - id: speaker_names
    type: std::string[16]
  - id: speaker_grouped
    type: bool[16]
    initial_value: '{false}'
  - id: speaker_join_member
    type: std::string
    initial_value: '""'
  - id: speaker_unjoin_target
    type: std::string
    initial_value: '""'
  - id: speaker_vol_target
    type: std::string
    initial_value: '""'
  - id: group_vol_index
    type: int
    initial_value: '0'
  - id: speaker_volumes
    type: float[16]
    initial_value: '{0.0f}'

text_sensor:
  - platform: homeassistant
    id: speakers_sensor
    entity_id: sensor.speaker_group
    attribute: data
    on_value:
      - script.execute: parse_speakers

  - platform: template
    id: group_members_sensor
    on_value:
      - script.execute: update_group_state

script:
  # ---------------------------------------------------------------------------
  # Parse the pipe-delimited attribute (ids|names|volumes) from the HA
  # template sensor into global arrays. Volumes are assigned directly
  # during reorder so no separate volume-mapping pass is needed.
  # ---------------------------------------------------------------------------
  - id: parse_speakers
    mode: restart
    then:
      - lambda: |-
          std::string raw = id(speakers_sensor).state;

          if (raw.empty() || raw == "None" || raw == "unknown") {
            id(speaker_count) = 0;
            ESP_LOGW("speaker_group", "No speakers found — showing fallback");
            id(show_fallback_speaker).execute();
            return;
          }

          // Split on '|' into ids / names / volumes sections
          size_t p1 = raw.find('|');
          size_t p2 = (p1 != std::string::npos) ? raw.find('|', p1 + 1) : std::string::npos;
          std::string ids_raw   = (p1 != std::string::npos) ? raw.substr(0, p1) : raw;
          std::string names_raw = (p1 != std::string::npos && p2 != std::string::npos)
              ? raw.substr(p1 + 1, p2 - p1 - 1) : "";
          std::string vols_raw  = (p2 != std::string::npos) ? raw.substr(p2 + 1) : "";

          // Helper: split a comma-separated string into a vector, trimming whitespace
          auto split_csv = [](const std::string &s, size_t max) {
            std::vector<std::string> out;
            size_t start = 0, end;
            while ((end = s.find(',', start)) != std::string::npos && out.size() < max) {
              std::string t = s.substr(start, end - start);
              while (!t.empty() && t.front() == ' ') t.erase(0, 1);
              while (!t.empty() && t.back() == ' ') t.pop_back();
              out.push_back(t);
              start = end + 1;
            }
            if (start < s.size() && out.size() < max) {
              std::string t = s.substr(start);
              while (!t.empty() && t.front() == ' ') t.erase(0, 1);
              while (!t.empty() && t.back() == ' ') t.pop_back();
              out.push_back(t);
            }
            return out;
          };

          std::vector<std::string> ids   = split_csv(ids_raw, 16);
          std::vector<std::string> names = split_csv(names_raw, 16);
          std::vector<std::string> vtoks = split_csv(vols_raw, 16);

          // Restore full entity IDs (prefix stripped in HA template for brevity)
          for (auto &eid : ids) {
            if (!eid.empty()) eid = "media_player." + eid;
          }

          // Convert volume strings to floats
          std::vector<float> vols;
          for (auto &t : vtoks) {
            auto v = esphome::parse_number<float>(t);
            vols.push_back(v.has_value() ? v.value() : 0.0f);
          }

          // Reset globals
          id(speaker_count) = 0;
          for (int i = 0; i < 16; i++) {
            id(speaker_entity_ids)[i] = "";
            id(speaker_names)[i] = "";
            id(speaker_grouped)[i] = false;
            id(speaker_volumes)[i] = 0.0f;
          }

          if (ids.empty()) {
            ESP_LOGW("speaker_group", "No speakers parsed — showing fallback");
            id(show_fallback_speaker).execute();
            return;
          }

          // If the selected player isn't in the speaker list, show fallback
          std::string selected = id(media_player_entity).state;
          bool found_selected = false;
          for (size_t i = 0; i < ids.size(); i++) {
            if (ids[i] == selected) { found_selected = true; break; }
          }
          if (!found_selected) {
            ESP_LOGD("speaker_group", "Selected player '%s' not in speaker list — showing fallback", selected.c_str());
            id(show_fallback_speaker).execute();
            return;
          }

          // Fill all speakers, then sort alphabetically by name
          int count = 0;
          for (size_t i = 0; i < ids.size() && count < 16; i++) {
            id(speaker_entity_ids)[count] = ids[i];
            id(speaker_names)[count] = (i < names.size()) ? names[i] : ids[i];
            id(speaker_volumes)[count] = (i < vols.size()) ? vols[i] : 0.0f;
            count++;
          }
          for (int i = 0; i < count - 1; i++) {
            for (int j = i + 1; j < count; j++) {
              if (id(speaker_names)[i] > id(speaker_names)[j]) {
                std::swap(id(speaker_entity_ids)[i], id(speaker_entity_ids)[j]);
                std::swap(id(speaker_names)[i], id(speaker_names)[j]);
                std::swap(id(speaker_volumes)[i], id(speaker_volumes)[j]);
              }
            }
          }

          id(speaker_count) = count;
          ESP_LOGI("speaker_group", "Discovered %d speakers", count);

          if (count > 1) {
            lv_label_set_text(id(speakers_title_label), "Speakers");
            lv_obj_clear_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(group_vol_card), LV_OBJ_FLAG_HIDDEN);
          } else {
            id(show_fallback_speaker).execute();
          }

      - script.execute: update_group_state

  # ---------------------------------------------------------------------------
  # Fallback: show a single card for the primary media player when the speaker
  # sensor is unavailable or the selected player isn't in the speaker list.
  # ---------------------------------------------------------------------------
  - id: show_fallback_speaker
    mode: restart
    then:
      - lambda: |-
          std::string entity = id(media_player_entity).state;
          if (entity.empty()) {
            lv_obj_add_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          for (int i = 0; i < 16; i++) {
            id(speaker_entity_ids)[i] = "";
            id(speaker_names)[i] = "";
            id(speaker_grouped)[i] = false;
            id(speaker_volumes)[i] = 0.0f;
          }

          id(speaker_entity_ids)[0] = entity;
          id(speaker_grouped)[0] = true;
          id(speaker_count) = 1;

          // Derive a display name from the entity ID
          std::string name = entity;
          if (name.size() > 13 && name.substr(0, 13) == "media_player.") name = name.substr(13);
          for (auto &c : name) { if (c == '_' || c == '-') c = ' '; }
          if (!name.empty()) name[0] = toupper(name[0]);
          id(speaker_names)[0] = name;

          id(speaker_volumes)[0] = id(media_volume_sensor).has_state()
              ? id(media_volume_sensor).state : 0.0f;

          lv_label_set_text(id(speakers_title_label), "Speaker");
          lv_obj_clear_flag(id(speakers_title_label), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(group_vol_card), LV_OBJ_FLAG_HIDDEN);
      - script.execute: update_grouping_panel

  # ---------------------------------------------------------------------------
  # Parse group_members and update the grouped state for each speaker slot.
  # group_members arrives as a string like: media_player.a, media_player.b
  # (HA native API serializes lists with comma separation).
  # ---------------------------------------------------------------------------
  - id: update_group_state
    mode: restart
    then:
      - lambda: |-
          std::string raw = id(group_members_sensor).has_state()
              ? id(group_members_sensor).state : "";

          // Strip Python-style list brackets and quotes if present
          while (!raw.empty() && (raw.front() == '[' || raw.front() == '\'' || raw.front() == '"' || raw.front() == ' '))
            raw.erase(0, 1);
          while (!raw.empty() && (raw.back() == ']' || raw.back() == '\'' || raw.back() == '"' || raw.back() == ' '))
            raw.pop_back();

          // Parse into a set of entity IDs
          std::vector<std::string> members;
          size_t start = 0, end;
          while ((end = raw.find(',', start)) != std::string::npos) {
            std::string token = raw.substr(start, end - start);
            // Strip whitespace and quotes from each token
            while (!token.empty() && (token.front() == ' ' || token.front() == '\'' || token.front() == '"'))
              token.erase(0, 1);
            while (!token.empty() && (token.back() == ' ' || token.back() == '\'' || token.back() == '"'))
              token.pop_back();
            if (!token.empty()) members.push_back(token);
            start = end + 1;
          }
          if (start < raw.size()) {
            std::string token = raw.substr(start);
            while (!token.empty() && (token.front() == ' ' || token.front() == '\'' || token.front() == '"'))
              token.erase(0, 1);
            while (!token.empty() && (token.back() == ' ' || token.back() == '\'' || token.back() == '"'))
              token.pop_back();
            if (!token.empty()) members.push_back(token);
          }

          std::string selected = id(media_player_entity).state;
          int count = id(speaker_count);
          for (int i = 0; i < count; i++) {
            if (id(speaker_entity_ids)[i] == selected) {
              id(speaker_grouped)[i] = true;
              continue;
            }
            bool found = false;
            for (auto &m : members) {
              if (m == id(speaker_entity_ids)[i]) {
                found = true;
                break;
              }
            }
            id(speaker_grouped)[i] = found;
          }

      - script.execute: update_grouping_panel

  # ---------------------------------------------------------------------------
  # Refresh LVGL panel: set card labels, button visibility, and styling.
  # ---------------------------------------------------------------------------
  - id: update_grouping_panel
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *cards[] = {
            id(speaker_card_0), id(speaker_card_1), id(speaker_card_2), id(speaker_card_3),
            id(speaker_card_4), id(speaker_card_5), id(speaker_card_6), id(speaker_card_7),
            id(speaker_card_8), id(speaker_card_9), id(speaker_card_10), id(speaker_card_11),
            id(speaker_card_12), id(speaker_card_13), id(speaker_card_14), id(speaker_card_15)
          };
          lv_obj_t *name_labels[] = {
            id(speaker_name_0), id(speaker_name_1), id(speaker_name_2), id(speaker_name_3),
            id(speaker_name_4), id(speaker_name_5), id(speaker_name_6), id(speaker_name_7),
            id(speaker_name_8), id(speaker_name_9), id(speaker_name_10), id(speaker_name_11),
            id(speaker_name_12), id(speaker_name_13), id(speaker_name_14), id(speaker_name_15)
          };
          lv_obj_t *vol_labels[] = {
            id(speaker_vol_label_0), id(speaker_vol_label_1), id(speaker_vol_label_2), id(speaker_vol_label_3),
            id(speaker_vol_label_4), id(speaker_vol_label_5), id(speaker_vol_label_6), id(speaker_vol_label_7),
            id(speaker_vol_label_8), id(speaker_vol_label_9), id(speaker_vol_label_10), id(speaker_vol_label_11),
            id(speaker_vol_label_12), id(speaker_vol_label_13), id(speaker_vol_label_14), id(speaker_vol_label_15)
          };
          lv_obj_t *btns[] = {
            id(speaker_btns_0), id(speaker_btns_1), id(speaker_btns_2), id(speaker_btns_3),
            id(speaker_btns_4), id(speaker_btns_5), id(speaker_btns_6), id(speaker_btns_7),
            id(speaker_btns_8), id(speaker_btns_9), id(speaker_btns_10), id(speaker_btns_11),
            id(speaker_btns_12), id(speaker_btns_13), id(speaker_btns_14), id(speaker_btns_15)
          };
          lv_obj_t *tops[] = {
            nullptr, id(speaker_top_1), id(speaker_top_2), id(speaker_top_3),
            id(speaker_top_4), id(speaker_top_5), id(speaker_top_6), id(speaker_top_7),
            id(speaker_top_8), id(speaker_top_9), id(speaker_top_10), id(speaker_top_11),
            id(speaker_top_12), id(speaker_top_13), id(speaker_top_14), id(speaker_top_15)
          };
          for (int i = 0; i < 16; i++) {
            if (i < id(speaker_count)) {
              lv_obj_clear_flag(cards[i], LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(name_labels[i], id(speaker_names)[i].c_str());

              if (id(speaker_grouped)[i]) {
                int pct = (int)(id(speaker_volumes)[i] * 100.0f);
                char vol_buf[8];
                snprintf(vol_buf, sizeof(vol_buf), "%d%%", pct);
                lv_label_set_text(vol_labels[i], vol_buf);
                lv_obj_clear_flag(vol_labels[i], LV_OBJ_FLAG_HIDDEN);
                lv_obj_set_style_bg_opa(cards[i], LV_OPA_COVER, 0);
                lv_obj_set_style_bg_color(cards[i], lv_color_hex(0x212121), 0);
                lv_obj_set_style_border_width(cards[i], 0, 0);
                lv_obj_set_style_flex_main_place(cards[i], LV_FLEX_ALIGN_SPACE_BETWEEN, 0);
                lv_obj_clear_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
                if (i > 0) {
                  lv_obj_clear_flag(cards[i], LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_add_flag(tops[i], LV_OBJ_FLAG_CLICKABLE);
                }
              } else {
                lv_obj_add_flag(vol_labels[i], LV_OBJ_FLAG_HIDDEN);
                lv_obj_set_style_bg_opa(cards[i], LV_OPA_COVER, 0);
                lv_obj_set_style_bg_color(cards[i], lv_color_hex(0x000000), 0);
                lv_obj_set_style_border_width(cards[i], 2, 0);
                lv_obj_set_style_border_color(cards[i], lv_color_hex(0x373737), 0);
                lv_obj_set_style_flex_main_place(cards[i], LV_FLEX_ALIGN_START, 0);
                lv_obj_add_flag(btns[i], LV_OBJ_FLAG_HIDDEN);
                if (i > 0) {
                  lv_obj_add_flag(cards[i], LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_clear_flag(tops[i], LV_OBJ_FLAG_CLICKABLE);
                }
              }
            } else {
              lv_obj_add_flag(cards[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

          std::string selected = id(media_player_entity).state;
          float group_vol = 0.0f;
          for (int i = 0; i < id(speaker_count); i++) {
            if (id(speaker_entity_ids)[i] == selected) {
              group_vol = id(speaker_volumes)[i];
              break;
            }
          }
          int group_pct = (int)(group_vol * 100.0f);
          char grp_buf[8];
          snprintf(grp_buf, sizeof(grp_buf), "%d%%", group_pct);
          lv_label_set_text(id(group_vol_label), grp_buf);
          lv_obj_clear_flag(id(group_vol_label), LV_OBJ_FLAG_HIDDEN);

  # ---------------------------------------------------------------------------
  # Join / unjoin a speaker by slot index (stored in a global before calling).
  # ---------------------------------------------------------------------------
  - id: speaker_toggle
    mode: single
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= id(speaker_count)) return;
          if (id(speaker_entity_ids)[slot] == id(media_player_entity).state) return;
          bool currently_grouped = id(speaker_grouped)[slot];

          if (currently_grouped) {
            // Unjoin: target is the speaker being removed
            id(speaker_unjoin_target) = id(speaker_entity_ids)[slot];
            id(do_speaker_unjoin).execute();
          } else {
            // Join: target is the leader, member is the speaker being added
            id(speaker_join_member) = id(speaker_entity_ids)[slot];
            id(do_speaker_join).execute();
          }

  - id: do_speaker_join
    mode: single
    then:
      - homeassistant.service:
          service: media_player.join
          variables:
            target: !lambda 'return id(media_player_entity).state;'
            member: !lambda 'return id(speaker_join_member);'
          data_template:
            entity_id: "{{ target }}"
            group_members: "{{ member }}"
          on_error:
            - logger.log:
                level: ERROR
                tag: speaker_group
                format: "Failed to join speaker"
      - logger.log:
          tag: speaker_group
          format: "Joined speaker to group"

  - id: do_speaker_unjoin
    mode: single
    then:
      - homeassistant.service:
          service: media_player.unjoin
          variables:
            target: !lambda 'return id(speaker_unjoin_target);'
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - logger.log:
                level: ERROR
                tag: speaker_group
                format: "Failed to unjoin speaker"
      - logger.log:
          tag: speaker_group
          format: "Removed speaker from group"

  # ---------------------------------------------------------------------------
  # Per-speaker volume +/- buttons
  # ---------------------------------------------------------------------------
  - id: speaker_volume_change
    mode: single
    parameters:
      slot: int
      direction: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= id(speaker_count)) return;
          id(speaker_vol_target) = id(speaker_entity_ids)[slot];
      - homeassistant.service:
          service: !lambda 'return direction > 0 ? "media_player.volume_up" : "media_player.volume_down";'
          variables:
            target: !lambda 'return id(speaker_vol_target);'
          data_template:
            entity_id: "{{ target }}"

  # ---------------------------------------------------------------------------
  # Group volume +/- (adjusts all grouped speakers)
  # ---------------------------------------------------------------------------
  - id: group_volume_up
    mode: single
    then:
      - lambda: |-
          id(group_vol_index) = 0;
      - script.execute:
          id: group_volume_step
          direction: 1

  - id: group_volume_down
    mode: single
    then:
      - lambda: |-
          id(group_vol_index) = 0;
      - script.execute:
          id: group_volume_step
          direction: -1

  - id: group_volume_step
    mode: restart
    parameters:
      direction: int
    then:
      - while:
          condition:
            lambda: |-
              int i = id(group_vol_index);
              int count = id(speaker_count);
              while (i < count && !id(speaker_grouped)[i]) {
                i++;
              }
              if (i >= count) return false;
              id(speaker_vol_target) = id(speaker_entity_ids)[i];
              id(group_vol_index) = i + 1;
              return true;
          then:
            - homeassistant.service:
                service: !lambda 'return direction > 0 ? "media_player.volume_up" : "media_player.volume_down";'
                variables:
                  target: !lambda 'return id(speaker_vol_target);'
                data_template:
                  entity_id: "{{ target }}"
            - delay: 150ms

