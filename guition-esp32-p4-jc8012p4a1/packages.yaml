substitutions:
  media_player: ""
  linked_media_player: ""
  ha_port: "8123"
  ha_host: "homeassistant.local"
  ha_protocol: "http"
  ha_verify_ssl: "true"
  # Display rotation: 90 (default landscape) or 270 (flipped landscape)
  # Flip to 270 if mounting with the power cable on the opposite side
  display_rotation: "90"
  # Touch transform (must match display_rotation):
  #   90:  touch_mirror_x "false", touch_mirror_y "false"
  #   270: touch_mirror_x "true",  touch_mirror_y "true"
  touch_mirror_x: "false"
  touch_mirror_y: "false"

  # -- Shared config (consumed by shared/ files) --
  artwork_size: "480"
  artwork_display_size: "800"
  image_byte_order: "little_endian"
  online_image_buffer_size: "131072"
  clock_cx: "640"
  clock_cy: "400"
  rgb565_read_expr: "data[pos] | (data[pos + 1] << 8)"
  device_slug: "guition-esp32-p4-jc8012p4a1"
  firmware_manifest_slug: "jc8012p4a1"
  post_artwork_script: "apply_warm_tones"
  track_info_duration_default: "0"

packages:
  # Shared
  time_sync: !include ../shared/addon/time.yaml
  timezone: !include ../shared/addon/timezone.yaml
  music: !include ../shared/addon/music.yaml
  backlight: !include ../shared/addon/backlight.yaml
  network: !include ../shared/addon/network.yaml
  speaker_group: !include ../shared/addon/speaker_group.yaml
  accent_color: !include ../shared/addon/accent_color.yaml
  firmware_update: !include ../shared/addon/firmware_update.yaml
  sensors: !include ../shared/device/sensors.yaml
  media_player_select: !include ../shared/device/media_player_select.yaml
  linked_sensors: !include ../shared/device/linked_sensors.yaml

  # Device-specific
  warm_tones: !include addon/warm_tones.yaml
  device: !include device/device.yaml
  lvgl: !include device/lvgl.yaml
  fonts: !include assets/fonts.yaml
  icons: !include assets/icons.yaml
  button: !include theme/button.yaml
