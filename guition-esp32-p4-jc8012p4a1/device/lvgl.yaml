                              width: 182
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
                              scrollable: false
                              clickable: false
                              layout:
                                type: flex
                                flex_flow: COLUMN
                                pad_row: 7
                              widgets:
                                - label:
                                    text: "Group"
                                    text_font: roboto_light30_font
