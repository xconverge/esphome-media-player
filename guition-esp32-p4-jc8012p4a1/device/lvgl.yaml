                                    text_color: 0xFFFFFF
                              on_press:
                                - script.execute:
                                    id: speaker_volume_up
                                    slot: 0
                          - switch:
                              id: speaker_sw_0
                              align: right_mid
                              width: 56
                              height: 32

                    # --- Row 1 ---
                    - obj:
                        id: speaker_row_1
