# =============================================================================
# LVGL MUSIC DASHBOARD - 1280x800 Landscape
# =============================================================================
# Split layout: album art on left 800x800, track info on right in 480px panel.
# Data from sensors.yaml; album art from online_image (addon/music.yaml).
# =============================================================================

lvgl:
  buffer_size: 12%
  byte_order: little_endian
  on_boot:
    - lambda: |-
        lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_SCROLL_MOMENTUM);
        lv_obj_clear_flag(id(speakers_container), LV_OBJ_FLAG_SCROLL_ELASTIC);
        lv_obj_set_scroll_dir(id(speakers_container), LV_DIR_VER);

  pages:
    - id: main_page
      scrollbar_mode: "off"
      scrollable: false
      width: 100%
      height: 100%
      bg_color: 0x000000
      pad_top: 0
      pad_bottom: 0
      pad_left: 0
      pad_right: 0

      widgets:
        # Colored backdrop behind artwork (visible for non-square TV art)
        - obj:
            id: artwork_bg_panel
            x: 0
            y: 0
            width: 800px
            height: 800px
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false

        # Full-height artwork (square, left side of screen)
        - image:
            id: album_art_background_widget
            x: 0
            y: 0
            width: 800px
            height: 800px
            src: album_art_background
            opa: 100%

        # Error label: shown when album art download fails
        - label:
            id: artwork_error_label
            text: "Artwork unavailable"
            x: 200
            y: 380
            width: 400px
            height: 30px
            text_font: roboto19_font
            text_color: 0x888888
            text_align: center
            hidden: true

        # Accent color background (right side, behind track info)
        - obj:
            id: accent_overlay
            x: 800
            y: 0
            width: 480px
            height: 800px
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false

        # Track info panel (flex column on right side)
        - obj:
            id: track_info_panel
            x: 840
            y: 40
            width: 400px
            height: 720px
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: COLUMN
              pad_row: 0
            widgets:
              - label:
                  id: media_title_label
                  text: "—"
                  width: 100%
                  max_height: 506px
                  long_mode: wrap
                  text_font: roboto_light88_font
                  text_color: 0xFFF5E0
                  text_align: left
                  text_line_space: 0
              - label:
                  id: media_artist_label
                  text: ""
                  pad_top: 4
                  width: 100%
                  long_mode: wrap
                  text_font: roboto_light40_font
                  text_color: 0xFFF5E0
                  text_opa: 80%
                  text_align: left
                  hidden: true
              - label:
                  id: media_time_label
                  text: "0:00  /  0:00"
                  pad_top: 12
                  width: 100%
                  text_font: roboto20_font
                  text_color: 0xFFF5E0
                  text_opa: 80%
                  text_align: left
                  on_click:
                    - switch.toggle: show_remaining_time

        # Play/pause button (bottom-right corner)
        - button:
            id: media_play_pause_button
            align: bottom_right
            x: -40
            y: -40
            width: 96px
            height: 96px
            radius: 48
            styles: control_round
            widgets:
              - label:
                  id: media_play_icon
                  text_font: icon_font_large
                  align: center
                  text: $play
                  text_color: 0xFFF5E0
                  hidden: false
              - label:
                  id: media_pause_icon
                  text_font: icon_font_large
                  align: center
                  text: $pause
                  text_color: 0xFFF5E0
                  hidden: true
            on_press:
              - homeassistant.service:
                  service: media_player.media_play_pause
                  variables:
                    target: !lambda |-
                      return id(is_tv_mode) ? id(linked_media_player_entity).state : id(media_player_entity).state;
                  data_template:
                    entity_id: "{{ target }}"
                  on_error:
                    - lambda: |-
                        if (!id(actions_prompt_acked) && !id(device_has_been_setup)) {
                          lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                        }
              - logger.log: "Media: play_pause"

        # Progress bar at the very bottom
        - bar:
            id: media_progress_bar
            align: bottom_mid
            y: 0
            width: 1280
            height: 6
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: 0xFFF5E0
              radius: 0

        - !include ../setup/setup_prompt.yaml
        - !include ../setup/actions_prompt.yaml

        # ---------------------------------------------------------------
        # SETTINGS PANEL (swipe-down from top)
        # ---------------------------------------------------------------
        - obj:
            id: settings_panel
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              # Close button (top-right)
              - button:
                  align: top_right
                  x: -24
                  y: 24
                  width: 64px
                  height: 64px
                  radius: 32
                  bg_color: 0x262626
                  bg_opa: 100%
                  border_width: 0
                  shadow_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $icon_close
                        text_color: 0xFFFFFF
                  on_press:
                    - script.execute: close_settings_panel

              # Volume arc dial (single-speaker mode)
              - arc:
                  id: volume_arc
                  align: center
                  y: 15
                  width: 620
                  height: 620
                  min_value: 0
                  max_value: 100
                  value: 30
                  adjustable: true
                  arc_color: 0x333333
                  arc_width: 20
                  arc_rounded: true
                  hidden: true
                  indicator:
                    arc_color: 0x999999
                    arc_width: 20
                    arc_rounded: true
                  knob:
                    bg_color: 0xFFFFFF
                    radius: 18
                    width: 36
                    height: 36
                    border_width: 0
                  on_value:
                    - lvgl.label.update:
                        id: volume_pct_label
                        text: !lambda |-
                          char buf[8];
                          snprintf(buf, sizeof(buf), "%d%%", (int)x);
                          return std::string(buf);
                    - if:
                        condition:
                          lambda: 'return !id(volume_updating_from_ha);'
                        then:
                          - homeassistant.service:
                              service: media_player.volume_set
                              variables:
                                target: !lambda 'return id(media_player_entity).state;'
                                vol_level: !lambda 'return x / 100.0f;'
                              data_template:
                                entity_id: "{{ target }}"
                                volume_level: "{{ vol_level }}"
              - label:
                  id: volume_title_label
                  text: "Volume"
                  text_font: roboto24_font
                  text_color: 0x888888
                  align: center
                  y: -70
                  width: 200
                  height: 30
                  text_align: center
                  hidden: true
              - label:
                  id: volume_pct_label
                  text: "30%"
                  text_font: roboto88_font
                  text_color: 0xFFFFFF
                  align: center
                  y: 15
                  width: 300
                  height: 96
                  text_align: center
                  hidden: true
              - button:
                  id: volume_down_button
                  align: center
                  x: -70
                  y: 250
                  width: 96px
                  height: 96px
                  radius: 48
                  styles: control_round
                  hidden: true
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $icon_minus
                        text_color: 0xFFFFFF
                  on_press:
                    - lvgl.arc.update:
                        id: volume_arc
                        value: !lambda |-
                          int v = lv_arc_get_value(id(volume_arc)) - 1;
                          if (v < 0) v = 0;
                          return v;
              - button:
                  id: volume_up_button
                  align: center
                  x: 70
                  y: 250
                  width: 96px
                  height: 96px
                  radius: 48
                  styles: control_round
                  hidden: true
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $icon_plus
                        text_color: 0xFFFFFF
                  on_press:
                    - lvgl.arc.update:
                        id: volume_arc
                        value: !lambda |-
                          int v = lv_arc_get_value(id(volume_arc)) + 1;
                          if (v > 100) v = 100;
                          return v;

              # Title
              - label:
                  id: speakers_title_label
                  text: "Speakers"
                  text_font: roboto_light60_font
                  text_color: 0xFFFFFF
                  x: 48
                  y: 38
                  width: 600
                  text_align: left
                  hidden: true

              # Close button (hidden by default; shared speaker_group.yaml references it)
              - button:
                  id: speakers_close_button
                  align: top_right
                  x: -12
                  y: 16
                  width: 64px
                  height: 64px
                  radius: 32
                  bg_color: 0x262626
                  bg_opa: 100%
