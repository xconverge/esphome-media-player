                  id: speakers_container
                  x: 4%
                  y: 149
                  width: 92%
                  height: 77%
                  bg_opa: 0%
                  border_width: 0
                  pad_left: 0
                  pad_right: 0
                  pad_top: 0
                  pad_bottom: 0
