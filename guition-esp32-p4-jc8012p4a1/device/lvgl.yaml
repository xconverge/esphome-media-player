                          - label:
                              id: speaker_icon_1
                              text: $icon_unchecked
                              text_font: $icon_font
                              text_color: 0xFFFFFF
                              x: 0
                              y: 2
                              on_click:
                                - script.execute:
                                    id: speaker_toggle
                                    slot: 1
                          - label:
                              id: speaker_name_1
