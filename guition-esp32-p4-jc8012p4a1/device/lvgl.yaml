                                bg_color: 0xFFFFFF
                                radius: 4
                                width: 14
                                height: 32
                                border_width: 0
                              hidden: true
                              on_value:
                                - lambda: |-
                                    if (id(speaker_slider_updating)) return;
                                    id(speaker_volumes)[0] = x / 100.0f;
                                    id(speaker_vol_target) = id(speaker_entity_ids)[0];
                                    id(debounce_speaker_volume).execute();

                    # --- Row 1 ---
                    - obj:
                        id: speaker_row_1
                        width: 580
                        height: 110
                        bg_opa: 0%
                        border_width: 0
                        pad_left: 8
                        pad_right: 8
                        pad_top: 8
                        pad_bottom: 8
                        scrollable: false
                        hidden: true
