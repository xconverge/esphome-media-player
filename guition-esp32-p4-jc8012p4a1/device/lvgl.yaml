                              value: 0
                              bg_color: 0x333333
                              bg_opa: 100%
                              radius: 8
                              indicator:
                                bg_color: 0x999999
                                radius: 8
                              knob:
                                bg_color: 0xFFFFFF
                                radius: 4
                                width: 14
                                height: 32
                                border_width: 0
                              hidden: true
                              on_value:
                                - lambda: |-
                                    if (id(speaker_slider_updating)) return;
                                    id(speaker_volumes)[7] = x / 100.0f;
                                    id(speaker_vol_target) = id(speaker_entity_ids)[7];
                                    id(debounce_speaker_volume).execute();

