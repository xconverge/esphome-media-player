        # ---------------------------------------------------------------
        - obj:
            id: loading_screen
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: false
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text: "Starting up"
                        text_font: roboto_light40_font
