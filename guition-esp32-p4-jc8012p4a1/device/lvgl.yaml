# =============================================================================
# LVGL MUSIC DASHBOARD - 1280x800 Landscape
# =============================================================================
# Split layout: album art on left 800x800, track info on right in 480px panel.
# Data from sensors.yaml; album art from online_image (addon/music.yaml).
# =============================================================================

lvgl:
  buffer_size: 25%
  byte_order: little_endian

  pages:
    - id: main_page
      scrollbar_mode: "off"
      scrollable: false
      width: 100%
      height: 100%
      bg_color: 0x000000
      pad_top: 0
      pad_bottom: 0
      pad_left: 0
      pad_right: 0

      widgets:
        # Colored backdrop behind artwork (visible for non-square TV art)
        - obj:
            id: artwork_bg_panel
            x: 0
            y: 0
            width: 800px
            height: 800px
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false

        # Full-height artwork (square, left side of screen)
        - image:
            id: album_art_background_widget
            x: 0
            y: 0
            width: 800px
            height: 800px
            src: album_art_background
            opa: 100%

        # Error label: shown when album art download fails
        - label:
            id: artwork_error_label
            text: "Artwork unavailable"
            x: 200
            y: 380
            width: 400px
            height: 30px
            text_font: roboto19_font
            text_color: 0x888888
            text_align: center
            hidden: true

        # Accent color background (right side, behind track info)
        - obj:
            id: accent_bg_panel
            x: 800
            y: 0
            width: 480px
            height: 800px
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false

        # Track info panel (flex column on right side)
        - obj:
            id: track_info_panel
            x: 840
            y: 40
            width: 400px
            height: 720px
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            layout:
              type: flex
              flex_flow: COLUMN
              pad_row: 0
            widgets:
              - label:
                  id: media_title_label
                  text: "—"
                  width: 100%
                  max_height: 506px
                  long_mode: wrap
                  text_font: roboto_light88_font
                  text_color: 0xFFFFFF
                  text_align: left
                  text_line_space: 0
              - label:
                  id: media_artist_label
                  text: ""
                  pad_top: 4
                  width: 100%
                  long_mode: wrap
                  text_font: roboto_light40_font
                  text_color: 0xFFFFFF
                  text_opa: 80%
                  text_align: left
                  hidden: true
              - label:
                  id: media_time_label
                  text: "0:00  /  0:00"
                  pad_top: 12
                  width: 100%
                  text_font: roboto20_font
                  text_color: 0xFFFFFF
                  text_opa: 80%
                  text_align: left
                  on_click:
                    - switch.toggle: show_remaining_time

        # Play/pause button (bottom-right corner)
        - button:
            id: media_play_pause_button
            align: bottom_right
            x: -40
            y: -40
            width: 96px
            height: 96px
            radius: 48
            styles: control_round
            widgets:
              - label:
                  id: media_play_icon
                  text_font: icon_font_large
                  align: center
                  text: $play
                  text_color: 0xFFFFFF
                  hidden: false
              - label:
                  id: media_pause_icon
                  text_font: icon_font_large
                  align: center
                  text: $pause
                  text_color: 0xFFFFFF
                  hidden: true
            on_press:
              - homeassistant.service:
                  service: media_player.media_play_pause
                  variables:
                    target: !lambda |-
                      return id(is_tv_mode) ? id(tv_media_player_entity).state : id(media_player_entity).state;
                  data_template:
                    entity_id: "{{ target }}"
                  on_error:
                    - lambda: |-
                        if (!id(actions_prompt_acked)) {
                          lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                        }
              - logger.log: "Media: play_pause"

        # Progress bar at the very bottom
        - bar:
            id: media_progress_bar
            align: bottom_mid
            y: 0
            width: 1280
            height: 6
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: 0xFFFFFF
              radius: 0

        # ---------------------------------------------------------------
        # SETUP PROMPT (no media player entity configured)
        # ---------------------------------------------------------------
        - obj:
            id: setup_prompt
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_cast
                        text_color: 0xFFFFFF
                    - label:
                        text: "Media Player"
                        text_font: roboto_light40_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        text: "Set the media player entity\nyou want to control in\ndevice settings"
                        text_font: roboto30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center

        # ---------------------------------------------------------------
        # ACTIONS PROMPT (enable HA actions toggle)
        # ---------------------------------------------------------------
        - obj:
            id: actions_prompt
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_shield
                        text_color: 0xFFFFFF
                    - label:
                        text: "Enable Actions"
                        text_font: roboto_light40_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        id: actions_instructions
                        text: "In Home Assistant, go to\nSettings > Devices > ESPHome\nFind the device and enable\n'Allow the device to perform\nHome Assistant actions'"
                        text_font: roboto30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center
                    - button:
                        width: 220
                        height: 52
                        radius: 26
                        bg_color: 0xFFFFFF
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              text: "Understood"
                              text_font: roboto30_font
                              text_color: 0x000000
                              align: center

        # ---------------------------------------------------------------
        # SETTINGS PANEL (swipe-down from top)
        # ---------------------------------------------------------------
        - obj:
            id: settings_panel
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              # Close button (top-right)
              - button:
                  align: top_right
                  x: -24
                  y: 24
                  width: 56px
                  height: 56px
                  radius: 28
                  bg_opa: 0%
                  border_width: 0
                  shadow_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        text_font: $icon_font
                        align: center
                        text: $icon_close
                        text_color: 0xFFFFFF
                  on_press:
                    - script.execute: close_settings_panel

              # Title
              - label:
                  id: speakers_title_label
                  text: "Speakers"
                  text_font: roboto_light40_font
                  text_color: 0xFFFFFF
                  align: top_mid
                  y: 32
                  width: 600
                  text_align: center
                  hidden: true

              # Hidden arc (keeps volume state for HA subscription sync)
              - arc:
                  id: volume_arc
                  x: -100
                  y: -100
                  width: 1
                  height: 1
                  min_value: 0
                  max_value: 100
                  value: 30
                  hidden: true
                  on_value:
                    - lvgl.label.update:
                        id: volume_pct_label
                        text: !lambda |-
                          char buf[8];
                          snprintf(buf, sizeof(buf), "%d%%", (int)x);
                          return std::string(buf);

              # Speaker list container (centered)
              - obj:
                  id: speakers_container
                  align: top_mid
                  y: 90
                  width: 600
                  height: 680
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: true
                  scrollbar_mode: auto
                  hidden: true
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    pad_row: 2
                  widgets:
                    # --- Group Volume row (always first) ---
                    - obj:
                        id: group_volume_row
                        width: 580
                        height: 96
                        bg_opa: 0%
                        border_width: 0
                        pad_left: 8
                        pad_right: 8
                        pad_top: 4
                        pad_bottom: 4
                        scrollable: false
                        widgets:
                          - label:
                              text: "Group Volume"
                              text_font: roboto30_font
                              text_color: 0xFFFFFF
                              x: 0
                              y: 4
                              width: 400
                          - label:
                              id: volume_pct_label
                              text: "30%"
                              text_font: roboto30_font
                              text_color: 0x999999
                              align: top_right
                              y: 4
                              width: 100
                              text_align: right
                          - slider:
                              id: group_volume_slider
                              x: 8
                              y: 55
                              width: 540
                              height: 36
                              min_value: 0
                              max_value: 100
                              value: 30
                              bg_color: 0x333333
                              bg_opa: 100%
                              radius: 8
                              indicator:
                                bg_color: 0x999999
                                radius: 8
                              knob:
                                bg_color: 0xFFFFFF
                                radius: 4
                                width: 14
                                height: 32
                                border_width: 0
                              on_value:
                                - lvgl.label.update:
                                    id: volume_pct_label
                                    text: !lambda |-
                                      char buf[8];
                                      snprintf(buf, sizeof(buf), "%d%%", (int)x);
                                      return std::string(buf);
                                - if:
                                    condition:
                                      lambda: 'return !id(volume_updating_from_ha);'
                                    then:
                                      - lambda: |-
                                          lv_arc_set_value(id(volume_arc), (int)x);
                                      - script.execute: debounce_group_volume
                    # --- Row 0 (selected speaker / leader) ---
                    - obj:
                        id: speaker_row_0
                        width: 580
                        height: 110
                        bg_opa: 0%
                        border_width: 0
                        pad_left: 8
                        pad_right: 8
                        pad_top: 8
                        pad_bottom: 8
                        scrollable: false
                        hidden: true
                        widgets:
                          - label:
                              id: speaker_icon_0
                              text: $icon_checked
                              text_font: $icon_font
                              text_color: 0xFFFFFF
                              x: 0
                              y: 2
                          - label:
                              id: speaker_name_0
                              text: ""
                              text_font: roboto30_font
                              text_color: 0xFFFFFF
                              x: 48
                              y: 6
                              width: 500
                          - slider:
                              id: speaker_slider_0
