                                - label:
                                    text_font: roboto19_font
                                    align: center
                                    text: "+"
                                    text_color: 0xFFFFFF
                              on_press:
                                - script.execute:
                                    id: speaker_volume_up
                                    slot: 7
                          - switch:
                              id: speaker_sw_7
                              align: right_mid
                              width: 56
                              height: 32
                              on_click:
                                - script.execute:
                                    id: speaker_toggle
                                    slot: 7

