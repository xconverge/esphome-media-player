# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC8012P4A1
# =============================================================================
# Hardware settings for the ESP32-P4 10.1" 1280x800 landscape touchscreen.
# Uses MIPI DSI display, GSL3680 touch controller, and ESP32-C6 coprocessor
# for WiFi/BT connectivity.
#
# WARNING: These settings are specific to the Guition ESP32-P4-JC8012P4A1.
#          Using this config with a different device may cause issues.
# =============================================================================


esp32:
  variant: ESP32P4
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_LV_DISP_DEF_REFR_PERIOD=10"
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"


# ESP32-C6 coprocessor for WiFi and Bluetooth via SDIO
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true


psram:
  mode: hex
  speed: 200MHz


# Hide screen during OTA to avoid flicker
ota:
  - platform: esphome
    on_begin:
      - lvgl.pause
      - light.turn_off:
          id: backlight
          transition_length: 0s
    on_error:
      - light.turn_on:
          id: backlight
          brightness: 100%
          transition_length: 0s
      - lvgl.resume


api:
  on_client_connected:
    - lambda: |-
        std::string host = "${ha_host}";
        if (host == "homeassistant.local") {
          id(ha_base_url) = "http://" + client_address + ":${ha_port}";
        } else {
          id(ha_base_url) = "http://${ha_host}:${ha_port}";
        }
    - lvgl.widget.hide: ha_setup_prompt
    - lambda: |-
        std::string old_val = id(tv_media_player_entity).state;
        if (!old_val.empty() && id(linked_media_player_entity).state.empty()) {
          ESP_LOGI("media_select", "Migrating TV entity '%s' to linked media player", old_val.c_str());
          auto call = id(linked_media_player_entity).make_call();
          call.set_value(old_val);
          call.perform();
        }
        if (!old_val.empty()) {
          auto call = id(tv_media_player_entity).make_call();
          call.set_value("");
          call.perform();
        }
    - script.execute: subscribe_media_player
    - script.execute: subscribe_linked_media_player
  on_client_disconnected:
    - lvgl.widget.hide: setup_prompt
    - if:
        condition:
          lambda: |-
            return !id(device_has_been_setup)
                && !id(boot_grace_period)
                && (esphome::api::global_api_server == nullptr
                    || !esphome::api::global_api_server->is_connected());
        then:
          - lvgl.widget.show: ha_setup_prompt


logger:
  level: DEBUG


external_components:
  - source: github://kvj/esphome@jd9365_gsl3680
    components: [gsl3680]


# DSI PHY power rail
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True


output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23


i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False


# -----------------------------------------------------------------------------
# GLOBAL STATE VARIABLES
# -----------------------------------------------------------------------------
globals:
  # -- Touch tracking (swipe gesture detection) --
  - id: touch_x_start
    type: int
    initial_value: '0'
  - id: touch_y_start
    type: int
    initial_value: '0'
  - id: touch_x_end
    type: int
    initial_value: '0'
  - id: touch_y_end
    type: int
    initial_value: '0'

  # -- UI overlay visibility --
  - id: is_screen_dimmed
    type: bool
    initial_value: 'false'
  - id: was_screen_dimmed
    type: bool
    initial_value: 'false'

  # -- Settings panel state --
  - id: is_panel_open
    type: bool
    initial_value: 'false'
  - id: was_panel_open
    type: bool
    initial_value: 'false'

  # -- TV source mode --
  - id: is_tv_mode
    type: bool
    initial_value: 'false'
  - id: is_tv_idle
    type: bool
    initial_value: 'false'

  # -- Setup flow --
  - id: actions_prompt_acked
    type: bool
    restore_value: true
    initial_value: 'false'
  # True after first successful setup (WiFi + HA + media entity); suppresses
  # WiFi/HA/actions setup prompts on restart so user sees loading/main UI instead.
  - id: device_has_been_setup
    type: bool
    restore_value: true
    initial_value: 'false'



# -----------------------------------------------------------------------------
# TOUCHSCREEN (GSL3680)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: gsl3680
    id: tft_touch
    display: tft_display
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    transform:
      swap_xy: true
      mirror_x: ${touch_mirror_x}
      mirror_y: ${touch_mirror_y}
    on_touch:
      - lambda: |-
          id(was_screen_dimmed) = id(is_screen_dimmed);
          id(was_panel_open) = id(is_panel_open);
          id(touch_x_start) = touch.x;
          id(touch_y_start) = touch.y;
          id(touch_x_end) = touch.x;
          id(touch_y_end) = touch.y;
      - script.execute: backlight_wake_timeout
      - lambda: |-
          if (id(is_panel_open)) id(start_speaker_panel_timeout).execute();
    on_update:
      - lambda: |-
          for (auto touch: touches) {
            if (touch.state <= 2) {
              id(touch_x_end) = touch.x;
              id(touch_y_end) = touch.y;
            }
          }
    on_release:
      - lambda: |-
          int dx = id(touch_x_end) - id(touch_x_start);
          int dy = id(touch_y_end) - id(touch_y_start);
          int sy = id(touch_y_start);
          ESP_LOGD("touch", "Swipe dx=%d dy=%d start=(%d,%d) end=(%d,%d)",
                   dx, dy, id(touch_x_start), id(touch_y_start),
                   id(touch_x_end), id(touch_y_end));

          // --- Dismiss actions prompt on tap ---
          if (!lv_obj_has_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN)) {
            if (abs(dx) < 20 && abs(dy) < 20) {
              lv_obj_add_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
              id(actions_prompt_acked) = true;
              id(device_has_been_setup) = true;
              global_preferences->sync();
              App.safe_reboot();
            }
            return;
          }

          // --- Vertical swipe: settings panel open (only from top 200px) ---
          if (dy > 30 && sy < 200 && abs(dy) > abs(dx) * 2 && !id(is_panel_open)) {
            id(open_settings_panel).execute();
            return;
          }
          if (id(is_panel_open) || id(was_panel_open)) {
            return;
          }

          // --- Horizontal swipe: track navigation (works when playing or paused) ---
          if (abs(dx) > 80 && abs(dx) > abs(dy) * 2) {
            bool can_skip = false;
            if (id(is_tv_mode)) {
              std::string e = id(linked_media_player_entity).state;
              can_skip = !e.empty() && id(tv_media_player_state_sensor).has_state();
              if (can_skip) {
                std::string s = id(tv_media_player_state_sensor).state;
                can_skip = (s == "playing" || s == "paused");
              }
            } else {
              std::string e = id(media_player_entity).state;
              can_skip = !e.empty() && id(media_player_state_sensor).has_state();
              if (can_skip) {
                std::string s = id(media_player_state_sensor).state;
                can_skip = (s == "playing" || s == "paused");
              }
            }
            if (can_skip) {
              if (dx > 0) {
                id(swipe_previous_track).execute();
              } else {
                id(swipe_next_track).execute();
              }
            }
          }


# -----------------------------------------------------------------------------
# INTERACTION SCRIPTS
# -----------------------------------------------------------------------------
# Track navigation: next/previous (allowed when playing or paused).
script:
  - id: swipe_next_track
    mode: single
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          variables:
            target: !lambda |-
              return id(is_tv_mode) ? id(linked_media_player_entity).state : id(media_player_entity).state;
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - lambda: |-
                if (!id(actions_prompt_acked)) {
                  lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                }
      - logger.log: "Media: next_track"
  - id: swipe_previous_track
    mode: single
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          variables:
            target: !lambda |-
              return id(is_tv_mode) ? id(linked_media_player_entity).state : id(media_player_entity).state;
          data_template:
            entity_id: "{{ target }}"
          on_error:
            - lambda: |-
                if (!id(actions_prompt_acked)) {
                  lv_obj_clear_flag(id(actions_prompt), LV_OBJ_FLAG_HIDDEN);
                }
      - logger.log: "Media: previous_track"

  - id: open_settings_panel
    mode: single
    then:
      - lambda: 'id(is_panel_open) = true;'
      - if:
          condition:
            lambda: 'return id(speaker_count) <= 1;'
          then:
            - script.execute: show_fallback_speaker
      - lvgl.widget.show: settings_panel
      - script.execute: start_speaker_panel_timeout
  - id: close_settings_panel
    mode: single
    then:
      - script.stop: start_speaker_panel_timeout
      - lvgl.widget.hide: settings_panel
      - lambda: 'id(is_panel_open) = false;'
  - id: start_speaker_panel_timeout
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(speaker_panel_timeout).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(speaker_panel_timeout).state * 1000);'
            - if:
                condition:
                  lambda: 'return id(is_panel_open);'
                then:
                  - script.execute: close_settings_panel

  - id: show_track_view
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(is_panel_open);'
          then:
            - lvgl.widget.hide: settings_panel
            - lambda: 'id(is_panel_open) = false;'

  - id: enter_tv_mode
    mode: single
    then:
      - lambda: |-
          id(is_tv_mode) = true;
          id(is_tv_idle) = false;
          id(last_tv_artwork_url) = "";
          lv_obj_set_style_bg_color(id(accent_bg_panel), lv_color_make(0, 0, 0), 0);
          lv_obj_set_style_bg_color(id(artwork_bg_panel), lv_color_make(0, 0, 0), 0);
          lv_obj_set_style_bg_color(id(media_play_pause_button), lv_color_make(0, 0, 0), 0);
      - lvgl.label.update:
          id: media_title_label
          text: !lambda 'return id(media_source_sensor).state;'
      - lambda: 'id(artist_has_content) = false;'
      - lvgl.widget.hide: media_artist_label
      - lvgl.widget.hide: artwork_error_label
      - lvgl.bar.update:
          id: media_progress_bar
          value: 0
      - lvgl.label.update:
          id: media_time_label
          text: "0:00"
      - if:
          condition:
            lambda: 'return id(linked_media_player_entity).state.empty();'
          then:
            - lambda: 'id(is_tv_idle) = true;'
            - lvgl.widget.hide: media_play_pause_button
            - lvgl.widget.hide: media_time_label
            - lvgl.widget.hide: media_progress_bar
            - lvgl.widget.hide: album_art_background_widget
            - script.execute: backlight_wake_timeout
          else:
            - if:
                condition:
                  lambda: |-
                    return id(tv_media_player_state_sensor).has_state()
                        && id(tv_media_player_state_sensor).state == "playing";
                then:
                  - lvgl.widget.hide: media_play_icon
                  - lvgl.widget.show: media_pause_icon
                else:
                  - lvgl.widget.show: media_play_icon
                  - lvgl.widget.hide: media_pause_icon
            - lvgl.image.update:
                id: album_art_background_widget
                src: album_art_placeholder
            - lvgl.widget.update:
                id: album_art_background_widget
                opa: 50%
      - script.execute: show_track_view
      - logger.log: "Entered linked media player mode"

  - id: exit_tv_mode
    mode: single
    then:
      - lambda: |-
          id(is_tv_mode) = false;
          id(is_tv_idle) = false;
          lv_obj_set_style_bg_color(id(artwork_bg_panel), lv_color_make(0, 0, 0), 0);
          lv_obj_set_size(id(album_art_background_widget), 800, 800);
          lv_obj_set_pos(id(album_art_background_widget), 0, 0);
      - lvgl.widget.show: media_play_pause_button
      - lvgl.widget.show: media_time_label
      - lvgl.label.update:
          id: media_title_label
          text: !lambda |-
            return id(media_title_sensor).has_state() && !id(media_title_sensor).state.empty()
                ? id(media_title_sensor).state : std::string("\xe2\x80\x94");
      - if:
          condition:
            lambda: |-
              return id(media_artist_sensor).has_state()
                  && !id(media_artist_sensor).state.empty()
                  && id(media_artist_sensor).state != "\xe2\x80\x94";
          then:
            - lambda: 'id(artist_has_content) = true;'
            - lvgl.label.update:
                id: media_artist_label
                text: !lambda 'return id(media_artist_sensor).state;'
            - lvgl.widget.show: media_artist_label
          else:
            - lambda: 'id(artist_has_content) = false;'
            - lvgl.widget.hide: media_artist_label
      - if:
          condition:
            lambda: |-
              return id(media_player_state_sensor).has_state()
                  && id(media_player_state_sensor).state == "playing";
          then:
            - lvgl.widget.hide: media_play_icon
            - lvgl.widget.show: media_pause_icon
          else:
            - lvgl.widget.show: media_play_icon
            - lvgl.widget.hide: media_pause_icon
      - lvgl.widget.show: album_art_background_widget
      - lvgl.image.update:
          id: album_art_background_widget
          src: album_art_background
      - lvgl.widget.update:
          id: album_art_background_widget
          opa: 100%
      - lvgl.widget.hide: artwork_error_label
      - if:
          condition:
            lambda: |-
              return id(media_entity_picture_sensor).has_state()
                  && !id(media_entity_picture_sensor).state.empty();
          then:
            - lambda: |-
                std::string path = id(media_entity_picture_sensor).state;
                while (!path.empty() && (path.back() == '\n' || path.back() == '\r' || path.back() == ' ')) path.pop_back();
                id(last_artwork_url) = (path.substr(0, 7) == "http://" || path.substr(0, 8) == "https://") ? path : (id(ha_base_url) + path);
            - online_image.set_url:
                id: album_art_background
                url: !lambda 'return id(last_artwork_url);'
      - script.execute: show_track_view
      - logger.log: "Exited linked media player mode"



# -----------------------------------------------------------------------------
# DISPLAY (MIPI DSI - JC8012P4A1)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: tft_display
    reset_pin: GPIO27
    rotation: ${display_rotation}
    auto_clear_enabled: false
    color_order: RGB
    dimensions:
      width: 800
      height: 1280